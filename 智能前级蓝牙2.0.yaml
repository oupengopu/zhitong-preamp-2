# ═══════════════════════════════════════════════════════════════
# 脚本
# ═══════════════════════════════════════════════════════════════
script:
  - id: media_reset
    mode: restart
    then:
      - delay: 300ms
      - lambda: |-
          id(media_select)->publish_state("空闲");

  - id: start_wifi_ap
    mode: restart
    then:
      - lambda: 'wifi::global_wifi_component->clear_sta();'
      - delay: 2s
      - lambda: 'App.safe_reboot();'

  # ── 恢复出厂设置: 重置所有存储值 + 清除 WiFi + 重启 ──
  # 触发方式: 待机或工作状态下长按编码器按键 10 秒
  # 流程: 重置变量 → 屏幕显示提示 → 清除 WiFi → 重启进入 AP 配网模式
  - id: factory_reset
    mode: restart
    then:
      - lambda: |-
          // 重置所有 restore_value 全局变量到安全默认值
          id(volume_val)          = 160;
          id(v210_migrated)       = true;  // 重置后标记已迁移, 不再二次缩放
          id(current_input)       = 0;
          id(balance)             = 0;
          id(max_volume)          = 255;
          id(power_on_limit)      = 192;
          id(display_timeout_min) = 5;
          id(display_brightness)  = 80;
          id(auto_input)          = true;
          id(theme)               = 0;
          id(input_vol_0)         = 160;
          id(input_vol_1)         = 160;
          id(input_vol_2)         = 160;
          id(input_vol_3)         = 160;
          id(soft_mute)           = false;
          // 重置按键映射为恒等映射
          id(key_map_1) = 1; id(key_map_2) = 2; id(key_map_3) = 3;
          id(key_map_4) = 4; id(key_map_5) = 5; id(key_map_6) = 6;
          id(key_map_7) = 7; id(key_map_8) = 8;
          id(key_map_9) = 9; id(key_map_10) = 10; id(key_map_11) = 11;
          id(key_map_12) = 12; id(key_map_13) = 13; id(key_map_14) = 14;

          // 同步到 HA
          id(max_volume_number)->publish_state(255.0f);
          id(power_on_limit_number)->publish_state(192.0f);
          id(balance_number)->publish_state(0.0f);
          id(display_brightness_number)->publish_state(80.0f);
          id(display_timeout_number)->publish_state(5.0f);
          id(theme_number)->publish_state(0.0f);
          id(auto_input_switch)->publish_state(true);

      - lvgl.page.show:
          id: main_page
          animation: LV_SCREEN_LOAD_ANIM_FADE_IN
          time: 200ms
      - lambda: |-
          lv_label_set_text(id(lbl_factory_msg), "已重置，请连接热点");
          lv_obj_remove_flag(id(lbl_factory_msg), LV_OBJ_FLAG_HIDDEN);
      - delay: 3s
      - lambda: |-
          wifi::global_wifi_component->clear_sta();
          App.safe_reboot();

  # ── 待机：关屏 + 静音 + 暂停 LVGL，WiFi 保持连接（HA 可远程唤醒） ──
  - id: enter_standby
    mode: restart
    then:
      - script.stop: display_idle_timer
      - lambda: |-
          id(saved_soft_mute) = id(soft_mute);
          id(soft_mute)       = true;
          id(target_db)       = -96.0f;
          id(mute_switch)->turn_off();
          id(display_backlight)->turn_off();
          pga2311::set_volume(0, 0);
          id(current_db)      = -96.0f;
          id(display_is_off)  = true;   // 同步显示状态
          id(system_ready)    = false;
          id(standby)         = true;
          id(standby_switch)->publish_state(false);  // HA 同步
      - lvgl.pause:
      - delay: 100ms

  # ── 退出待机 ──
  - id: exit_standby
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(standby);'
          then:
            - lambda: 'ESP_LOGD("standby", "Already awake, exit_standby skipped");'
          else:
            - script.stop: display_idle_timer
            - script.stop: enter_standby
            - lambda: |-
                id(standby)    = false;
                id(last_manual_input_ms) = 0;   // 退出待机 → 重新启用自动选择
                id(soft_mute)  = id(saved_soft_mute);
                id(current_db) = -96.0f;
                id(target_db)  = -96.0f;
                pga2311::set_volume(0, 0);
                if (id(volume_val) > id(power_on_limit)) id(volume_val) = id(power_on_limit);
                id(standby_switch)->publish_state(true);  // HA 同步
            - light.turn_on:
                id: display_backlight
                transition_length: 800ms
                brightness: !lambda 'return id(display_brightness) / 100.0f;'
            - lvgl.resume:
            - delay: 2s
            - script.execute: switch_input
            - wait_until:
                condition:
                  lambda: 'return !id(switch_input)->is_running();'
            - script.execute: apply_theme    # ★ 待机恢复后应用主题色
            - lambda: 'id(system_ready) = true;'
            - lvgl.page.show: main_page
            - script.execute: display_idle_timer

  - id: reset_idle_timer
    mode: restart
    then:
      - lambda: |-
          if (id(display_is_off) && !id(standby)) {
            auto call = id(display_backlight)->turn_on();
            call.set_brightness(id(display_brightness) / 100.0f);
            call.perform();
            id(display_is_off) = false;
          }
          id(last_display_interaction) = millis();

  - id: display_idle_timer
    mode: restart
    then:
      - lambda: 'id(last_display_interaction) = millis();'
      - while:
          condition:
            lambda: 'return !id(standby);'
          then:
            - delay: 1s
            - lambda: |-
                uint32_t now = millis();
                uint32_t elapsed = now - id(last_display_interaction);
                uint32_t timeout_ms = id(display_timeout_min) * 60000u;
                if (!id(display_is_off) && elapsed >= timeout_ms) {
                  auto call = id(display_backlight)->turn_on();
                  call.set_brightness(0.10f);
                  id(display_is_off) = true;
                }

  # ══════════════════════════════════════════════════════════════
  # show_volume_big: 音量大字体浮层 (2秒后自动返回主页)
  # ══════════════════════════════════════════════════════════════
  - id: show_volume_big
    mode: restart
    then:
      - lambda: |-
          if (id(display_is_off) && !id(standby)) {
            auto call = id(display_backlight)->turn_on();
            call.set_brightness(id(display_brightness) / 100.0f);
            id(display_is_off) = false;
          }
          id(last_display_interaction) = millis();

      - lvgl.page.show:
          id: volume_big_page
          animation: LV_SCREEN_LOAD_ANIM_FADE_IN
          time: 150ms
      - lambda: |-
          float reg_f = (float)id(volume_val);
          float db = (reg_f < 1.0f) ? -96.0f : (reg_f - 192.0f) * 0.5f;
          char buf[16];
          snprintf(buf, sizeof(buf), "%.1fdB", db);
          lv_label_set_text(id(lbl_vol_big), buf);

      # 2秒后自动返回主页由 LVGL on_idle (timeout:2s) 处理，无需在此重复 delay
      # mode: restart 确保每次旋转都重置 LVGL 空闲计时器

  # ══════════════════════════════════════════════════════════════
  # ★ V17 巅峰内核：双区间速度渐变 + 软锁释放
  # ══════════════════════════════════════════════════════════════
  - id: send_volume_to_pga
    mode: restart
    then:
      - lambda: |-
          if (id(ota_active) || id(temp_protect)) {
            id(current_db) = -96.0f;
            id(target_db)  = -96.0f;
            pga2311::set_volume(0, 0);
            return;
          }

          if (!id(switching_input)) {
            if (id(soft_mute)) {
              id(target_db) = -96.0f;
            } else {
              float reg_f = (float)id(volume_val);
              if (reg_f < 1.0f) {
                id(target_db) = -96.0f;
              } else {
                id(target_db) = (reg_f - 192.0f) * 0.5f;
              }
            }
          }

      - while:
          condition:
            lambda: |-
              if (id(ota_active) || id(temp_protect)) return false;
              return fabs(id(target_db) - id(current_db)) > 0.09f;
          then:
            - lambda: |-
                float diff = id(target_db) - id(current_db);
                float diff_abs = fabs(diff);
                float speed;

                if (diff_abs > 10.0f) {
                  speed = 0.12f;
                } else if (diff_abs > 3.0f) {
                  speed = 0.08f;
                } else {
                  speed = 0.18f;
                }

                id(current_db) += diff * speed;

                float db = id(current_db);
                int base_reg;
                if (db <= -95.5f) {
                  base_reg = 0;
                } else {
                  base_reg = (int)roundf(192.0f + db * 2.0f);
                  if (base_reg < 0)   base_reg = 0;
                  if (base_reg > 255) base_reg = 255;
                }

                int bal = id(balance);
                if (bal < -20) bal = -20;
                if (bal > 20)  bal = 20;

                // balance > 0 = 偏右：只衰减左声道
                // balance < 0 = 偏左：只衰减右声道
                int l_reg = base_reg;
                int r_reg = base_reg;

                if (bal > 0) {
                 l_reg -= bal;
                } else if (bal < 0) {
                 r_reg += bal;   // bal 为负数，所以这里等价于 r_reg - abs(bal)
                }

                // 完整限幅，防止未来算法调整后越界
                if (l_reg < 0)   l_reg = 0;
                if (l_reg > 255) l_reg = 255;
                if (r_reg < 0)   r_reg = 0;
                if (r_reg > 255) r_reg = 255;

                pga2311::set_volume(r_reg, l_reg);
            - delay: 15ms

      - lambda: |-
          if (id(ota_active) || id(temp_protect)) return;

          id(current_db) = id(target_db);

          float db = id(current_db);
          int base_reg;
          if (db <= -95.5f) {
            base_reg = 0;
          } else {
            base_reg = (int)roundf(192.0f + db * 2.0f);
            if (base_reg < 0)   base_reg = 0;
            if (base_reg > 255) base_reg = 255;
          }

                int bal = id(balance);
                if (bal < -20) bal = -20;
                if (bal > 20)  bal = 20;

                // balance > 0 = 偏右：只衰减左声道
                // balance < 0 = 偏左：只衰减右声道
                int l_reg = base_reg;
                int r_reg = base_reg;

                if (bal > 0) {
                 l_reg -= bal;
                } else if (bal < 0) {
                 r_reg += bal;   // bal 为负数，所以这里等价于 r_reg - abs(bal)
                }

                // 完整限幅，防止未来算法调整后越界
                if (l_reg < 0)   l_reg = 0;
                if (l_reg > 255) l_reg = 255;
                if (r_reg < 0)   r_reg = 0;
                if (r_reg > 255) r_reg = 255;

                pga2311::set_volume(r_reg, l_reg);

          float vol_pct = roundf((float)id(volume_val) * 100.0f / (float)id(max_volume));
          if (vol_pct > 100.0f) vol_pct = 100.0f;
          id(volume_number)->publish_state(vol_pct);
          id(balance_number)->publish_state((float)id(balance));
          float media_pct = (float)id(volume_val) / (float)id(max_volume);
          if (media_pct > 1.0f) media_pct = 1.0f;
          id(media_volume)->publish_state(media_pct * 100.0f);

          int cur = id(current_input);
          int vol = id(volume_val);

          int last = 0;
          switch (cur) {
            case 0: last = id(last_saved_vol_0); break;
            case 1: last = id(last_saved_vol_1); break;
            case 2: last = id(last_saved_vol_2); break;
            case 3: last = id(last_saved_vol_3); break;
          }

          uint32_t now = millis();
          bool diff_large  = abs(vol - last) >= 2 && (now - id(last_save_ms) > 1500);
          bool stop_detect = abs(vol - last) > 0  && (now - id(last_v_change_ms) > 2000);

          if (!id(soft_mute) && (diff_large || stop_detect)) {
            id(last_save_ms) = now;
            switch (cur) {
              case 0: id(last_saved_vol_0) = vol; id(input_vol_0) = vol; break;
              case 1: id(last_saved_vol_1) = vol; id(input_vol_1) = vol; break;
              case 2: id(last_saved_vol_2) = vol; id(input_vol_2) = vol; break;
              case 3: id(last_saved_vol_3) = vol; id(input_vol_3) = vol; break;
            }
            ESP_LOGD("V17_SYNC", "Input %d volume %d saved safely.", cur, vol);
          }

