                case 3: return lv_color_hex(0x8B5CF6);
                case 4: return lv_color_hex(0x0071E3);
                case 5: return lv_color_hex(0xCD9B4A);
                case 6: return lv_color_hex(0x06B6D4);
                case 7: return lv_color_hex(0xF97316);
                default: return lv_color_hex(0x10B981);
