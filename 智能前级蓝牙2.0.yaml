  - id: switch_input
    mode: queued
    max_runs: 1
    then:
      - lambda: |-
          id(switching_input) = true;
          switch (id(current_input)) {
            case 0: id(input_vol_0) = id(volume_val); id(last_saved_vol_0) = id(volume_val); break;
            case 1: id(input_vol_1) = id(volume_val); id(last_saved_vol_1) = id(volume_val); break;
            case 2: id(input_vol_2) = id(volume_val); id(last_saved_vol_2) = id(volume_val); break;
            case 3: id(input_vol_3) = id(volume_val); id(last_saved_vol_3) = id(volume_val); break;
          }

      - if:
          condition:
            lambda: 'return !id(soft_mute);'
          then:
            - lambda: 'id(target_db) = -96.0f;'
            - script.execute: send_volume_to_pga
            - wait_until:
                condition:
                  lambda: 'return id(current_db) <= -95.5f;'
                timeout: 1200ms

      - lambda: 'pga2311::set_volume(0, 0);'
      - switch.turn_off: mute_switch
      - delay: 30ms

      - lambda: |-
          id(relay_in1)->turn_off();
          id(relay_in2)->turn_off();
          id(relay_in3)->turn_off();
          id(relay_in4)->turn_off();
      - delay: 50ms

      - lambda: |-
          switch (id(current_input)) {
            case 0: id(relay_in1)->turn_on(); break;
            case 1: id(relay_in2)->turn_on(); break;
            case 2: id(relay_in3)->turn_on(); break;
            case 3: id(relay_in4)->turn_on(); break;
          }
          const char* names[] = {"CD", "DAC", "PC", "AUX"};
          id(input_select)->publish_state(names[id(current_input)]);
      - delay: 100ms

      - if:
          condition:
            lambda: 'return !id(soft_mute) && !id(temp_protect);'
          then:
            - switch.turn_on: mute_switch
      - delay: 20ms

      - lambda: |-
          int new_vol = 160;
          switch (id(current_input)) {
            case 0: new_vol = id(input_vol_0); break;
            case 1: new_vol = id(input_vol_1); break;
            case 2: new_vol = id(input_vol_2); break;
            case 3: new_vol = id(input_vol_3); break;
          }
          if (new_vol > id(max_volume)) new_vol = id(max_volume);
          id(volume_val) = new_vol;
          id(last_v_change_ms) = millis();

          float vol_pct = roundf((float)id(volume_val) * 100.0f / (float)id(max_volume));
          if (vol_pct > 100.0f) vol_pct = 100.0f;
          id(volume_number)->publish_state(vol_pct);

          id(switching_input) = false;

      - if:
          condition:
            lambda: 'return !id(soft_mute) && !id(temp_protect);'
          then:
            - script.execute: send_volume_to_pga

  # ══════════════════════════════════════════════════════════════
  # ★ 自动输入切换：信号丢失等 8s → 优先级切换 (CD>DAC>PC>AUX)
  #   - 当前输入信号丢失后，等待 8 秒看是否恢复（曲目间隙不误切）
  #   - 8 秒内信号恢复 → 保持当前输入，不切换
  #   - 8 秒后仍未恢复 → 按优先级切换到有信号的输入
  #   - 所有输入均无信号 → 保持当前不动
  #   - mode: restart 确保 8s 等待期内传感器再次变化时重置计时
  # ══════════════════════════════════════════════════════════════
  - id: auto_switch_input
    mode: restart
    then:
      - delay: 200ms   # 等待所有传感器稳定, 避免多个信号交叉触发
      - lambda: |-
          if (!id(auto_input) || !id(system_ready) || id(switching_input) || id(standby)) return;

          // 检查当前输入是否还有信号
          bool cur_has_signal = false;
          switch (id(current_input)) {
            case 0: cur_has_signal = id(audio_cd)->state; break;
            case 1: cur_has_signal = id(audio_dac)->state; break;
            case 2: cur_has_signal = id(audio_pc)->state; break;
            case 3: cur_has_signal = id(audio_aux)->state; break;
          }
          // 当前输入还有信号 → 无需处理（可能是其他输入触发导致脚本启动）
          if (cur_has_signal) return;

          ESP_LOGI("auto_input", "信号丢失，等待 8s 看是否恢复...");

      - delay: 8s   # 信号丢失等待期（mode:restart → 信号恢复时传感器触发，脚本重新开始）

      - lambda: |-
          if (!id(auto_input) || !id(system_ready) || id(switching_input) || id(standby)) return;

          // ── 8s 后再次检查当前输入是否恢复 ──
          {
            bool cur_has_signal = false;
            switch (id(current_input)) {
              case 0: cur_has_signal = id(audio_cd)->state; break;
              case 1: cur_has_signal = id(audio_dac)->state; break;
              case 2: cur_has_signal = id(audio_pc)->state; break;
              case 3: cur_has_signal = id(audio_aux)->state; break;
            }
            if (cur_has_signal) {
              ESP_LOGI("auto_input", "信号已在 8s 内恢复，保持当前输入");
              return;
            }
          }

          // ── 手动选择保护：用户手动选过某输入后，只在该输入失去信号时才自动切换 ──
          if (id(last_manual_input_ms) != 0) {
            id(last_manual_input_ms) = 0;
            ESP_LOGI("auto_input", "手动选择信号丢失，恢复自动切换");
          }

          // 优先级: CD(0) > DAC(1) > PC(2) > AUX(3)
          int target = -1;
          if (id(audio_cd)->state)  target = 0;
          else if (id(audio_dac)->state) target = 1;
          else if (id(audio_pc)->state)  target = 2;
          else if (id(audio_aux)->state) target = 3;

          // 所有通道无信号 → 保持当前输入（宁留无声也不盲目切换）
          if (target < 0) {
            ESP_LOGI("auto_input", "无其他可用信号，保持当前输入");
            return;
          }

          // 已经在目标通道 — 无需切换
          if (id(current_input) == target) return;

          ESP_LOGI("auto_input", "自动切换: %d -> %d", id(current_input), target);
          id(current_input) = target;
          const char* names[] = {"CD", "DAC", "PC", "AUX"};
          id(input_select)->publish_state(names[target]);
          id(switch_input)->execute();

# ═══════════════════════════════════════════════════════════════
# 传感器
# ═══════════════════════════════════════════════════════════════
sensor:
  - platform: rotary_encoder
    name: "音量编码器"
    id: volume_encoder
    pin_a:
      number: GPIO17
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO18
      mode:
        input: true
        pullup: true
    resolution: 1
    internal: true
    on_value:
      then:
        - lambda: |-
            static int last_enc = 0;
            int cur = (int)x;
            int diff = cur - last_enc;
            if (diff < -10) diff = -10;  // 防编码器计数器翻转导致的音量突变
            if (diff > 10) diff = 10;
            last_enc = cur;
            if (diff == 0) return;
            lv_obj_t* active = lv_scr_act();
            uint32_t now = millis();
            if (now - id(last_control_ms) < 30) return;
            id(last_control_ms) = now;

            // ═══════════════════════════════════════════════
            // 设置页导航（单列列表：选中→进入→调节→确认）
            // ═══════════════════════════════════════════════
            if (active == id(settings_page)->obj) {
              lv_obj_t** rows = settings_ui::rows();
              lv_obj_t** bars = settings_ui::bars();
              int idx = id(settings_focus_idx);
              int act = id(settings_active_idx);

              // ── 当前主题高亮色 ──
              lv_color_t hl_color = get_theme_accent(id(theme));

              // ── 更新焦点指示（左边界 + 背景） ──
              auto set_focus = [&](int i) {
                for (int j = 0; j < settings_ui::N; j++) {
                  if (j < 8 || j == 8 || j == 9) {
                    if (j == i) {
                      lv_obj_set_style_border_width(rows[j], 3, LV_PART_MAIN);
                      lv_obj_set_style_border_color(rows[j], hl_color, LV_PART_MAIN);
                      lv_obj_set_style_border_side(rows[j], LV_BORDER_SIDE_LEFT, LV_PART_MAIN);
                      lv_obj_set_style_bg_color(rows[j], lv_color_hex(0x1E2D42), LV_PART_MAIN);
                    } else {
                      lv_obj_set_style_border_width(rows[j], 0, LV_PART_MAIN);
                      lv_obj_set_style_bg_color(rows[j],
                        j < 8 ? lv_color_hex(0x162032) : lv_color_hex(0x111827), LV_PART_MAIN);
                    }
                  } else {
                    // Read-only rows (10, 11): no border, slightly darker bg
                    lv_obj_set_style_border_width(rows[j], 0, LV_PART_MAIN);
                    lv_obj_set_style_bg_color(rows[j],
                      (j == i) ? lv_color_hex(0x1E2D42) : lv_color_hex(0x111827), LV_PART_MAIN);
                  }
                }
              };

              if (act < 0) {
                // ── 浏览模式：移动焦点（无限循环） ──
                int new_idx = idx + diff;
                if (new_idx < 0) new_idx = settings_ui::N - 1;
                if (new_idx >= settings_ui::N) new_idx = 0;
                if (new_idx != idx) {
                  id(settings_focus_idx) = new_idx;
                  set_focus(new_idx);
                  lv_obj_scroll_to_view(rows[new_idx], LV_ANIM_ON);
                }
              } else {
                // ── 调节模式：修改数值 ──
                int step = diff;
                switch (act) {
                  case 0: { // 最大音量
                    int v = id(max_volume) + step;
                    if (v < 10) v = 10; if (v > 255) v = 255;
                    id(max_volume) = v;
                    lv_bar_set_value(id(bar_max_vol), v, LV_ANIM_OFF);
                    lv_label_set_text(id(val_max_vol), (std::to_string(v)).c_str());
                    id(max_volume_number)->publish_state((float)v);
                    if (id(volume_val) > v) id(volume_val) = v;
                    id(send_volume_to_pga)->execute();
                    break;
                  }
                  case 1: { // 开机上限
                    int v = id(power_on_limit) + step;
                    if (v < 10) v = 10; if (v > 255) v = 255;
                    id(power_on_limit) = v;
                    lv_bar_set_value(id(bar_power_on_limit), v, LV_ANIM_OFF);
                    lv_label_set_text(id(val_power_on), (std::to_string(v)).c_str());
                    id(power_on_limit_number)->publish_state((float)v);
                    if (id(volume_val) > v) id(volume_val) = v;
                    id(send_volume_to_pga)->execute();
                    break;
                  }
                  case 2: { // 声道平衡
                    int v = id(balance) + step;
                    if (v < -20) v = -20; if (v > 20) v = 20;
                    id(balance) = v;
                    lv_bar_set_value(id(bar_balance), v + 20, LV_ANIM_OFF);
                    {
                      char buf[8];
                      if (v == 0) lv_label_set_text(id(val_balance), "平衡");
                      else { snprintf(buf, sizeof(buf), "%s%d", v < 0 ? "L" : "R", v < 0 ? -v : v);
                        lv_label_set_text(id(val_balance), buf); }
                    }
                    id(balance_number)->publish_state((float)v);
                    id(send_volume_to_pga)->execute();
                    break;
                  }
                  case 3: { // 输入选择（循环, 模运算防快旋跳过中间值）
                    int v = ((id(current_input) + step) % 4 + 4) % 4;
                    if (v != id(current_input)) {
                      id(current_input) = v;
                      id(last_manual_input_ms) = millis();
                      const char* names[] = {"CD", "DAC", "PC", "AUX"};
                      lv_label_set_text(id(val_input), names[v]);
                      uint32_t _n = millis();
                      if (_n - id(last_switch_ms) >= 1500) {
                        id(last_switch_ms) = _n;
                        id(input_select)->publish_state(names[v]);
                        id(switch_input)->execute();
                      }
                    }
                    break;
                  }
                  case 4: { // 输入自动切换（toggle）
                    bool v = !id(auto_input);
                    id(auto_input) = v;
                    lv_label_set_text(id(val_auto_switch), v ? "自动" : "手动");
                    id(auto_input_switch)->publish_state(v);
                    break;
                  }
                  case 5: { // 屏幕亮度
                    int v = id(display_brightness) + step;
                    if (v < 0) v = 0; if (v > 100) v = 100;
                    id(display_brightness) = v;
                    lv_bar_set_value(id(bar_brightness), v, LV_ANIM_OFF);
                    {
                      char buf[8];
                      snprintf(buf, sizeof(buf), "%d%%", v);
                      lv_label_set_text(id(val_brightness), buf);
                    }
                    {
                      auto call = id(display_backlight)->turn_on();
                      call.set_brightness(v / 100.0f);
                      call.perform();
                    }
                    id(display_brightness_number)->publish_state((float)v);
                    break;
                  }
                  case 6: { // 息屏超时
                    int v = id(display_timeout_min) + step;
                    if (v < 1) v = 1; if (v > 60) v = 60;
                    id(display_timeout_min) = v;
                    lv_bar_set_value(id(bar_display_timeout), v, LV_ANIM_OFF);
                    {
                      char buf[8];
                      snprintf(buf, sizeof(buf), "%d分钟", v);
                      lv_label_set_text(id(val_timeout), buf);
                    }
                    id(last_display_interaction) = now;
                    id(display_timeout_number)->publish_state((float)v);
                    break;
                  }
                  case 7: { // 主题色彩（循环）
                    int v = id(theme) + step;
                    if (v < 0) v = 7; if (v > 7) v = 0;
                    id(theme) = v;
                    {
                      const char* names[] = {"翠绿", "赤红", "天蓝", "紫色", "麦景图蓝", "金嗓子金", "柏林青", "南瓜橙"};
                      lv_label_set_text(id(val_theme), names[v]);
                      lv_color_t colors[] = {lv_color_hex(0x10B981), lv_color_hex(0xEF4444), lv_color_hex(0x3B82F6), lv_color_hex(0x8B5CF6), lv_color_hex(0x0071E3), lv_color_hex(0xCD9B4A), lv_color_hex(0x06B6D4), lv_color_hex(0xF97316)};
                      lv_obj_set_style_bg_color(id(theme_dot), colors[v], LV_PART_MAIN);
                    }
                    id(theme_number)->publish_state((float)v);
                    id(apply_theme)->execute();
                    break;
                  }
                }
              }
              return;
            }

            // ═══ 蓝牙遥控页导航（无限循环，跳过隐藏行：0=扫描, 1-3=设备槽, 4=返回）═══
            if (active == id(ble_remote_page)->obj) {
              int count = id(ble_remote_device_count);
              int cur = id(ble_remote_focus_idx);
              // 构建有效焦点索引数组：扫描(0) + 设备槽(1~count) + 返回(4)
              int valid[5];
              int valid_count = 1;
              valid[0] = 0;  // 扫描始终有效
              for (int i = 0; i < count && i < 3; i++) {
                valid[valid_count++] = i + 1;
              }
              valid[valid_count++] = 4;  // 返回始终可达
              // 找到当前位置
              int pos = 0;
              for (int i = 0; i < valid_count; i++) {
                if (valid[i] == cur) { pos = i; break; }
              }
              // 循环移动
              pos += diff;
              if (pos < 0) pos = valid_count - 1;
              if (pos >= valid_count) pos = 0;
              int new_idx = valid[pos];
              if (new_idx != cur) {
                id(ble_remote_focus_idx) = new_idx;
                // 更新焦点高亮
                // 行 list: ble_row_scan(0), ble_row_dev0/1/2(1-3), ble_row_back(4)
                // 主题色
                lv_color_t hl_color = get_theme_accent(id(theme));
                auto ble_set_focus = [&](lv_obj_t* row, bool focused) {
                  if (focused) {
                    lv_obj_set_style_border_width(row, 3, LV_PART_MAIN);
                    lv_obj_set_style_border_color(row, hl_color, LV_PART_MAIN);
                    lv_obj_set_style_border_side(row, LV_BORDER_SIDE_LEFT, LV_PART_MAIN);
                    lv_obj_set_style_bg_color(row, lv_color_hex(0x1E2D42), LV_PART_MAIN);
                  } else {
                    lv_obj_set_style_border_width(row, 0, LV_PART_MAIN);
                    lv_obj_set_style_bg_color(row, lv_color_hex(0x162032), LV_PART_MAIN);
                  }
                };
                ble_set_focus(id(ble_row_scan), new_idx == 0);
                ble_set_focus(id(ble_row_dev0), new_idx == 1);
                ble_set_focus(id(ble_row_dev1), new_idx == 2);
                ble_set_focus(id(ble_row_dev2), new_idx == 3);
                ble_set_focus(id(ble_row_back), new_idx == 4);
                // 自动滚动到焦点
                lv_obj_t* focus_rows[] = {id(ble_row_scan), id(ble_row_dev0), id(ble_row_dev1), id(ble_row_dev2), id(ble_row_back)};
                lv_obj_scroll_to_view(focus_rows[new_idx], LV_ANIM_ON);
              }
              return;
            }

            // ═══ 遥控器按键页导航（9行：0-7=按键, 8=返回。调节模式循环0-15全动作）═══
            if (active == id(remote_keys_page)->obj) {
              int act = id(keymap_active_idx);
              if (act >= 0) {
                // ── 调节模式：旋转循环映射 0=禁用, 1-15=对应动作 ──
                int cur = 0;
                switch (act) {
                  case 0: cur = id(key_map_1); break; case 1: cur = id(key_map_2); break;
                  case 2: cur = id(key_map_3); break; case 3: cur = id(key_map_4); break;
                  case 4: cur = id(key_map_5); break; case 5: cur = id(key_map_6); break;
                  case 6: cur = id(key_map_7); break; case 7: cur = id(key_map_8); break;
                }
                int next = cur + diff;
                if (next < 0) next = 15;
                if (next > 15) next = 0;
                switch (act) {
                  case 0: id(key_map_1) = next; lv_label_set_text(id(val_keymap_0), remote_keys::get_action_name(next).c_str()); break;
                  case 1: id(key_map_2) = next; lv_label_set_text(id(val_keymap_1), remote_keys::get_action_name(next).c_str()); break;
                  case 2: id(key_map_3) = next; lv_label_set_text(id(val_keymap_2), remote_keys::get_action_name(next).c_str()); break;
                  case 3: id(key_map_4) = next; lv_label_set_text(id(val_keymap_3), remote_keys::get_action_name(next).c_str()); break;
                  case 4: id(key_map_5) = next; lv_label_set_text(id(val_keymap_4), remote_keys::get_action_name(next).c_str()); break;
                  case 5: id(key_map_6) = next; lv_label_set_text(id(val_keymap_5), remote_keys::get_action_name(next).c_str()); break;
                  case 6: id(key_map_7) = next; lv_label_set_text(id(val_keymap_6), remote_keys::get_action_name(next).c_str()); break;
                  case 7: id(key_map_8) = next; lv_label_set_text(id(val_keymap_7), remote_keys::get_action_name(next).c_str()); break;
                }
              } else {
                // ── 浏览模式：移动焦点 ──
                int cur = id(keymap_focus_idx);
                int new_idx = cur + diff;
                if (new_idx < 0) new_idx = 8;
                if (new_idx > 8) new_idx = 0;
                if (new_idx != cur) {
                  id(keymap_focus_idx) = new_idx;
                  lv_color_t hl_color = get_theme_accent(id(theme));
                  lv_obj_t* rows_k[] = {
                    id(keymap_row_0), id(keymap_row_1), id(keymap_row_2),
                    id(keymap_row_3), id(keymap_row_4), id(keymap_row_5),
                    id(keymap_row_6), id(keymap_row_7), id(keymap_row_back)
                  };
                  for (int i = 0; i <= 8; i++) {
                    bool focused = (i == new_idx);
                    if (focused) {
                      lv_obj_set_style_border_width(rows_k[i], 3, LV_PART_MAIN);
                      lv_obj_set_style_border_color(rows_k[i], hl_color, LV_PART_MAIN);
                      lv_obj_set_style_border_side(rows_k[i], LV_BORDER_SIDE_LEFT, LV_PART_MAIN);
                      lv_obj_set_style_bg_color(rows_k[i], lv_color_hex(0x1E2D42), LV_PART_MAIN);
                    } else {
                      lv_obj_set_style_border_width(rows_k[i], 0, LV_PART_MAIN);
                      lv_obj_set_style_bg_color(rows_k[i],
                        i == 8 ? lv_color_hex(0x111827) : lv_color_hex(0x162032), LV_PART_MAIN);
                    }
                  }
                  lv_obj_scroll_to_view(rows_k[new_idx], LV_ANIM_ON);
                }
              }
              return;
            }

            // ═══ 诊断页导航（2行：0=重校准, 1=返回设置）═══
            if (active == id(debug_page)->obj) {
              int cur = id(debug_focus_idx);
              int new_idx = (cur + diff) > 1 ? 1 : ((cur + diff) < 0 ? 0 : (cur + diff));
              if (new_idx != cur) {
                id(debug_focus_idx) = new_idx;
                lv_color_t hl_color = get_theme_accent(id(theme));
                bool recal_focused = (new_idx == 0);
                bool back_focused = (new_idx == 1);
                lv_obj_set_style_border_width(id(dbg_row_recal), recal_focused ? 3 : 0, LV_PART_MAIN);
                lv_obj_set_style_border_color(id(dbg_row_recal), hl_color, LV_PART_MAIN);
                lv_obj_set_style_border_side(id(dbg_row_recal), LV_BORDER_SIDE_LEFT, LV_PART_MAIN);
                lv_obj_set_style_bg_color(id(dbg_row_recal), recal_focused ? lv_color_hex(0x1E2D42) : lv_color_hex(0x162032), LV_PART_MAIN);
                lv_obj_set_style_border_width(id(dbg_row_back), back_focused ? 3 : 0, LV_PART_MAIN);
                lv_obj_set_style_border_color(id(dbg_row_back), hl_color, LV_PART_MAIN);
                lv_obj_set_style_border_side(id(dbg_row_back), LV_BORDER_SIDE_LEFT, LV_PART_MAIN);
                lv_obj_set_style_bg_color(id(dbg_row_back), back_focused ? lv_color_hex(0x1E2D42) : lv_color_hex(0x111827), LV_PART_MAIN);
                lv_obj_scroll_to_view(new_idx == 0 ? id(dbg_row_recal) : id(dbg_row_back), LV_ANIM_ON);
              }
              return;
            }

            // ═══ 音量调节（仅主/浮层/频谱页，频谱页旋转同步返回主页）═══
            if (active != id(main_page)->obj && active != id(volume_big_page)->obj && active != id(spectrum_page)->obj) return;
            // 屏幕休眠时恢复亮度
            if (id(display_is_off)) {
              auto call = id(display_backlight)->turn_on();
              call.set_brightness(id(display_brightness) / 100.0f);
              id(display_is_off) = false;
            }
            if (id(switching_input)) return;
            int new_vol = id(volume_val) + diff;
            if (new_vol < 0) new_vol = 0;
            if (new_vol > id(max_volume)) new_vol = id(max_volume);
            id(volume_val) = new_vol;
            id(last_v_change_ms) = now;
            float pct = roundf((float)new_vol * 100.0f / (float)id(max_volume));
            if (pct > 100.0f) pct = 100.0f;
            id(volume_number)->publish_state(pct);
        - if:
            condition:
              lambda: 'return lv_scr_act() == id(spectrum_page)->obj;'
            then:
              # 频谱页旋转 → 调音量 + 返回主页
              - script.execute: send_volume_to_pga
              - lvgl.page.show:
                  id: main_page
                  animation: LV_SCREEN_LOAD_ANIM_FADE_IN
                  time: 150ms
            else:
              - if:
                  condition:
                    lambda: 'return lv_scr_act() != id(settings_page)->obj;'
                  then:
                    - script.execute: send_volume_to_pga
                    - script.execute: show_volume_big
        - script.execute: reset_idle_timer
  - platform: template
    name: "机箱温度"
    id: ntc_temp
    icon: mdi:thermometer
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: never
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x > 72.0f && !id(temp_protect);'
            then:
              - logger.log: "温度超限(>72)，触发保护性静音"
              - lambda: 'id(temp_protect) = true;'
              - switch.turn_off: mute_switch
              - script.execute: send_volume_to_pga
        - if:
            condition:
              lambda: 'return x < 55.0f && id(temp_protect);'
            then:
              - logger.log: "温度恢复(<55)，解除保护层"
              - lambda: 'id(temp_protect) = false;'
              - lambda: |-
                  if (!id(soft_mute)) id(mute_switch)->turn_on();
              - script.execute: send_volume_to_pga

  - platform: wifi_signal
