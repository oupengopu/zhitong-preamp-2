number:
  - platform: template
    name: "主音量 Volume"
    id: volume_number
    icon: mdi:volume-high
    min_value: 0
    max_value: 100
    unit_of_measurement: "%"
    step: 1
    mode: slider
    set_action:
      - lambda: |-
          if (!id(system_ready) || id(switching_input)) return;
          int v = (int)roundf(x * id(max_volume) / 100.0f);
          if (v < 0) v = 0;
          if (v > id(max_volume)) v = id(max_volume);
          id(volume_val) = v;
          id(last_v_change_ms) = millis();
      - script.execute: send_volume_to_pga
      - script.execute: reset_idle_timer

  - platform: template
    name: "声道平衡 Balance"
    id: balance_number
    icon: mdi:scale-balance
    min_value: -20
    max_value: 20
    step: 1
    mode: slider
    set_action:
      - lambda: |-
          if (!id(system_ready)) return;
          id(balance) = (int)x;
          // 音量稳态时，直接同步 L/R 声道到 PGA
          if (fabs(id(target_db) - id(current_db)) <= 0.09f) {
            float db = id(current_db);
            int base_reg;
            if (db <= -95.5f) {
              base_reg = 0;
            } else {
              base_reg = (int)roundf(192.0f + db * 2.0f);
              if (base_reg < 0) base_reg = 0;
              if (base_reg > 255) base_reg = 255;
            }

                int bal = id(balance);
                if (bal < -20) bal = -20;
                if (bal > 20)  bal = 20;

                // balance > 0 = 偏右：只衰减左声道
                // balance < 0 = 偏左：只衰减右声道
                int l_reg = base_reg;
                int r_reg = base_reg;

                if (bal > 0) {
                 l_reg -= bal;
                } else if (bal < 0) {
                 r_reg += bal;   // bal 为负数，所以这里等价于 r_reg - abs(bal)
                }

                // 完整限幅，防止未来算法调整后越界
                if (l_reg < 0)   l_reg = 0;
                if (l_reg > 255) l_reg = 255;
                if (r_reg < 0)   r_reg = 0;
                if (r_reg > 255) r_reg = 255;

                pga2311::set_volume(r_reg, l_reg);
          }
      - script.execute: send_volume_to_pga
      - script.execute: reset_idle_timer
  - platform: template
    name: "最大音量上限 Max"
    id: max_volume_number
    icon: mdi:volume-high
    min_value: 10
    max_value: 255
    step: 1
    mode: slider
    initial_value: 255
    set_action:
      - lambda: |-
          float old_max = id(max_volume) > 0 ? (float)id(max_volume) : 1.0f;
          float current_pct = (float)id(volume_val) / old_max;
          id(max_volume) = (int)x;
          int new_vol = (int)(current_pct * id(max_volume));
          if (new_vol > id(max_volume)) new_vol = id(max_volume);
          id(volume_val) = new_vol;
          id(max_volume_number)->publish_state((float)id(max_volume));
      - lambda: |-
          float pct = (float)id(volume_val) / (float)id(max_volume);
          if (pct > 1.0f) pct = 1.0f;
          id(volume_number)->publish_state(pct * 100.0f);
      - script.execute: send_volume_to_pga

  - platform: template
    name: "开机音量限制 Limit"
    id: power_on_limit_number
    icon: mdi:volume-low
    min_value: 10
    max_value: 255
    step: 1
    mode: slider
    initial_value: 192
    set_action:
      - lambda: 'id(power_on_limit) = (int)x;'
      - script.execute: reset_idle_timer

  - platform: template
    name: "屏幕亮度 Brightness"
    id: display_brightness_number
    icon: mdi:brightness-6
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    set_action:
      - lambda: |-
          if (!id(system_ready)) return;
          id(display_brightness) = (int)x;
          {
            auto call = id(display_backlight)->turn_on();
            call.set_brightness(x / 100.0f);
            call.perform();
          }
          id(display_is_off) = false;
          id(display_brightness_number)->publish_state((float)id(display_brightness));
      - script.execute: reset_idle_timer

  - platform: template
    name: "息屏超时 Timeout"
    id: display_timeout_number
    icon: mdi:monitor-off
    min_value: 1
    max_value: 60
    step: 1
    mode: box
    initial_value: 5
    set_action:
      - lambda: 'id(display_timeout_min) = (int)x;'

  - platform: template
    name: "主题色彩 Theme"
    id: theme_number
    icon: mdi:palette
    min_value: 0
    max_value: 7
    step: 1
    mode: slider
    initial_value: 0
    set_action:
      - lambda: |-
          if (!id(system_ready)) return;
          id(theme) = (int)x;
      - script.execute: apply_theme

select:
  - platform: template
    name: "媒体控制 Media"
    id: media_select
    icon: mdi:play-circle
    options: ["空闲", "播放", "暂停", "下一首", "上一首", "开机", "关机"]
    initial_option: "空闲"
    optimistic: true
    set_action:
      - lambda: |-
          id(media_select)->publish_state(x);
          if (x == "开机") {
            if (id(standby)) id(standby_switch)->turn_on();
            else id(media_reset)->execute();
          } else if (x == "关机") {
            if (!id(standby)) id(standby_switch)->turn_off();
            else id(media_reset)->execute();
          } else if (x != "空闲") {
            id(media_reset)->execute();
          }

  - platform: template
    name: "输入源选择 Input"
    id: input_select
    icon: mdi:music-circle
    options: ["CD", "DAC", "PC", "AUX"]
    set_action:
      - lambda: |-
          if (!id(system_ready)) return;
          uint32_t now = millis();
          if (now - id(last_switch_ms) < 1500) return;
          id(last_switch_ms) = now;
          id(last_manual_input_ms) = millis();   // 记录手动选择
          if      (x == "CD")  { id(current_input) = 0; id(switch_input)->execute(); id(reset_idle_timer)->execute(); }
          else if (x == "DAC") { id(current_input) = 1; id(switch_input)->execute(); id(reset_idle_timer)->execute(); }
          else if (x == "PC")  { id(current_input) = 2; id(switch_input)->execute(); id(reset_idle_timer)->execute(); }
          else if (x == "AUX") { id(current_input) = 3; id(switch_input)->execute(); id(reset_idle_timer)->execute(); }

# ═══════════════════════════════════════════════════════════════
# 定时读取 — MSGEQ7 频谱 + NTC 温度 + LVGL 更新
# ═══════════════════════════════════════════════════════════════
# 性能优化要点:
#   1. 全部合并到单次 lambda — 消除 8 次 ESPHome action 调度开销
#   2. get_frame() 一次快照 — 1 次加锁替代 14 次 get_combined/get_peak
#   3. 直接 LVGL API — 绕过 ESPHome widget wrapper, 无 float 转换, 无动画
#   4. 仅更新变化的频段 — 避免相同值触发 LVGL 重绘
interval:
  - interval: 50ms
    then:
      - lambda: |-
          // 信号强度 (跨块共享: 频谱块写入, LED 块读取)
          static int s_signal_avg = 0;

          // ── MSGEQ7 频谱读取 (20Hz, 仅非待机时) ──
          if (!id(standby)) {
            msgeq7::read();
          }

          // ── NTC 温度读取 (每10秒) ──
          static int ntc_counter = 0;
          ntc_counter++;
          if (ntc_counter >= 200) {
            ntc_counter = 0;
            msgeq7::read_ntc();
            float _ntc = msgeq7::get_temperature();
            if (msgeq7::is_temperature_valid(_ntc)) {
              id(ntc_temp)->publish_state(_ntc);
            }
          }

          // ═══ LVGL 频谱 + 峰值更新 (直接 API, 单次加锁快照) ═══
          // 静音时频谱冻结不更新，避免跳动割裂感
          if (!id(soft_mute)) {
            // get_frame() 一次加锁拷贝 combined[7] + peak[7] + temperature
            // 替代原来的 7×get_combined() + 7×get_peak() = 14 次加锁
            msgeq7::SpectrumFrame frame;
            msgeq7::get_frame(&frame);

            // 频谱条和峰值线的 LVGL 对象指针 (14条: 7左 + 7右)
            lv_obj_t* bars_L[] = {
              id(spec_L_0), id(spec_L_1), id(spec_L_2),
              id(spec_L_3), id(spec_L_4), id(spec_L_5), id(spec_L_6)
            };
            lv_obj_t* bars_R[] = {
              id(spec_R_0), id(spec_R_1), id(spec_R_2),
              id(spec_R_3), id(spec_R_4), id(spec_R_5), id(spec_R_6)
            };
            lv_obj_t* peaks_L[] = {
              id(peak_L_0), id(peak_L_1), id(peak_L_2),
              id(peak_L_3), id(peak_L_4), id(peak_L_5), id(peak_L_6)
            };
            lv_obj_t* peaks_R[] = {
              id(peak_R_0), id(peak_R_1), id(peak_R_2),
              id(peak_R_3), id(peak_R_4), id(peak_R_5), id(peak_R_6)
            };

            const int bar_top = 30;
            const int bar_h = 88;
            const int peak_h = 2;

            for (int i = 0; i < 7; i++) {
              // 左声道
              int l_val = frame.left[i];
              if (lv_bar_get_value(bars_L[i]) != l_val) {
                lv_bar_set_value(bars_L[i], l_val, LV_ANIM_OFF);
              }
              int l_pk = frame.peak_l[i];
              int l_y = (l_pk < 1) ? (bar_top + bar_h - peak_h)
                                   : (bar_top + bar_h - l_pk * bar_h / 255 - peak_h);
              if (peaks_L[i]) lv_obj_set_y(peaks_L[i], l_y);

              // 右声道
              int r_val = frame.right[i];
              if (lv_bar_get_value(bars_R[i]) != r_val) {
                lv_bar_set_value(bars_R[i], r_val, LV_ANIM_OFF);
              }
              int r_pk = frame.peak_r[i];
              int r_y = (r_pk < 1) ? (bar_top + bar_h - peak_h)
                                   : (bar_top + bar_h - r_pk * bar_h / 255 - peak_h);
              if (peaks_R[i]) lv_obj_set_y(peaks_R[i], r_y);
            }

            // ═══ VU 电平条 (L/R 声道独立) ═══
            {
              static int last_vu_l = -1, last_vu_r = -1;
              int sum_l = 0, sum_r = 0;
              for (int i = 0; i < 7; i++) {
                sum_l += frame.left[i];
                sum_r += frame.right[i];
              }
              int avg_l = sum_l / 7;
              int avg_r = sum_r / 7;
              if (avg_l != last_vu_l) {
                last_vu_l = avg_l;
                lv_bar_set_value(id(vu_meter_l), avg_l, LV_ANIM_OFF);
              }
              if (avg_r != last_vu_r) {
                last_vu_r = avg_r;
                lv_bar_set_value(id(vu_meter_r), avg_r, LV_ANIM_OFF);
              }
            }

            // ═══ 信号强度 (供 LED 呼吸用, 取 L/R 较大值) ═══
            {
              int sum_l = 0, sum_r = 0;
              for (int i = 0; i < 7; i++) {
                sum_l += frame.left[i];
                sum_r += frame.right[i];
              }
              int l_avg = sum_l / 7;
              int r_avg = sum_r / 7;
              s_signal_avg = (l_avg > r_avg) ? l_avg : r_avg;
            }
          }  // end if (!id(soft_mute))
          // 静音时保持上次信号值, 防止频谱页因信号归零而提前退出

          // ═══ 恢复出厂设置: 编码器按键 10 秒检测 ═══
          //   待机或工作状态下, 长按编码器按键 10 秒触发。
          //   LVGL 恢复后 (exit_standby 在 800ms 长按后唤醒) 显示倒计时。
          {
            static uint32_t hold_start = 0;
            static bool triggered = false;
            uint32_t now = millis();
            bool pressed = id(encoder_button).state;

            if (triggered) {
              // 已触发, 等待 factory_reset 脚本执行
            } else if (pressed) {
              if (hold_start == 0) {
                hold_start = now;  // 首次检测到按下
              }
              uint32_t elapsed = now - hold_start;
              if (elapsed >= 10000) {
                triggered = true;
                id(factory_reset)->execute();
              } else if (elapsed >= 5000) {
                // 5 秒后给视觉反馈: 非待机时更新 LVGL, 待机时仅靠 LED 加速闪烁
                if (!id(standby)) {
                  lv_label_set_text(id(lbl_factory_msg), "继续按住恢复出厂设置...");
                  lv_obj_remove_flag(id(lbl_factory_msg), LV_OBJ_FLAG_HIDDEN);
                }
              }
            } else {
              // 按键松开 → 重置跟踪, 隐藏消息
              if (hold_start != 0) {
                hold_start = 0;
                triggered = false;
                lv_label_set_text(id(lbl_factory_msg), "");
                lv_obj_add_flag(id(lbl_factory_msg), LV_OBJ_FLAG_HIDDEN);
              }
            }
          }

          // ═══ 开机闪屏: Logo 渐显 → 主页面过渡 ═══
          //   开机后 splash_page 为初始页面, 文字渐显 500ms。
          //   满足最短展示 3 秒且 WiFi 已连接 (或 10 秒超时) 后,
          //   以 FADE_IN 动画切换到主页面。
          {
            static bool splash_done = false;
            static int fade_frame = 0;

            if (!splash_done && lv_scr_act() == id(splash_page)->obj) {
              // Logo 渐显: 11 帧 (0=微光→10=全亮, 550ms @ 50ms interval)
              if (fade_frame <= 10) {
                lv_opa_t opa = (fade_frame == 0) ? 15 : (fade_frame == 10) ? 255 : (fade_frame * 24 + 15);
                lv_obj_set_style_opa(id(lbl_splash_title), opa, LV_PART_MAIN);
                lv_obj_set_style_opa(id(lbl_splash_sub), opa, LV_PART_MAIN);
                fade_frame++;
              }

              // 过渡条件: 最短 3 秒 + (WiFi 已连接 或 10 秒超时)
              uint32_t now = millis();
              if (now >= 3000) {
                bool wifi_ok = wifi::global_wifi_component->is_connected();
                if (wifi_ok || now >= 10000) {
                  splash_done = true;
                  lv_scr_load_anim(id(main_page)->obj, LV_SCR_LOAD_ANIM_FADE_IN, 300, 0, false);
                }
              }
            } else if (!splash_done) {
              // splash_page 未激活 (例如调试模式), 标记为完成
              splash_done = true;
            }
          }

          // ═══ 频谱页自动切换 (基于 MSGEQ7 真实频谱信号) ═══
          //   取代旧 on_idle 的 30s/35s 超时 (使用 MCP23017 audio_cd/dac/pc/aux 的旧逻辑)
          {
            static bool was_signal = false;
            static uint32_t signal_lost_ms = 0;
            static uint32_t signal_stable_ms = 0;

            bool has_signal = s_signal_avg > 8;  // 阈值略高于 NOISE_GATE (8)

            uint32_t now = millis();
            if (has_signal) {
              signal_lost_ms = 0;
              if (!was_signal) signal_stable_ms = now;
            } else {
              signal_stable_ms = 0;
              if (was_signal) signal_lost_ms = now;
            }
            was_signal = has_signal;

            // 待机或系统未就绪时不自动跳转（但不 return，继续执行后续更新）
            if (!id(standby) && id(system_ready)) {
              lv_obj_t* active = lv_scr_act();

              // 1. 主页面 → 频谱页：信号存在且稳定 ≥15 秒
              if (active == id(main_page)->obj && has_signal
                  && signal_stable_ms > 0 && (now - signal_stable_ms >= 15000)) {
                lv_scr_load_anim(id(spectrum_page)->obj, LV_SCR_LOAD_ANIM_FADE_IN, 200, 0, false);
              }
              // 2. 频谱页 → 主页面：信号消失 ≥10 秒
              else if (active == id(spectrum_page)->obj && !has_signal
                  && signal_lost_ms > 0 && (now - signal_lost_ms >= 10000)) {
                lv_scr_load_anim(id(main_page)->obj, LV_SCR_LOAD_ANIM_FADE_IN, 200, 0, false);
              }
            }
          }

          // ═══ 页面空闲自动返回主页（设置页/BLE页 10s, 诊断页 30s）═══
          if (id(system_ready) && !id(standby)) {
            lv_obj_t* active = lv_scr_act();
            uint32_t now = millis();
            uint32_t idle_ms = now - id(last_display_interaction);
            bool is_settings = (active == id(settings_page)->obj);
            bool is_ble      = (active == id(ble_remote_page)->obj);
            bool is_keymap   = (active == id(remote_keys_page)->obj);
            bool is_debug    = (active == id(debug_page)->obj);
            if (is_settings || is_ble || is_keymap) {
              if (idle_ms >= 10000) {
                // 清理设置页调节状态，防止再次进入时 bar 高度残留
                if (is_settings) {
                  int active = id(settings_active_idx);
                  if (active >= 0) {
                    lv_obj_t** rows = settings_ui::rows();
                    lv_obj_t** bars = settings_ui::bars();
                    if (rows[active]) lv_obj_set_style_bg_color(rows[active], lv_color_hex(0x1E2D42), LV_PART_MAIN);
                    if (bars[active]) lv_obj_set_height(bars[active], settings_ui::bar_base_heights[active]);
                    id(settings_active_idx) = -1;
                  }
                }
                lv_scr_load_anim(id(main_page)->obj, LV_SCR_LOAD_ANIM_FADE_IN, 200, 0, false);
                id(last_display_interaction) = now;  // 防重复触发
              }
            } else if (is_debug) {
              if (idle_ms >= 30000) {
                lv_scr_load_anim(id(main_page)->obj, LV_SCR_LOAD_ANIM_FADE_IN, 200, 0, false);
                id(last_display_interaction) = now;
              }
            }
          }

          // ═══ 音量 dB 标签更新 (含变化检测) ═══
          {
            static float last_db = -999.0f;
            float reg_f = (float)id(volume_val);
            float db = (reg_f < 1.0f) ? -96.0f : (reg_f - 192.0f) * 0.5f;
            if (fabsf(db - last_db) > 0.01f) {
              last_db = db;
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1fdB", db);
              lv_label_set_text(id(lbl_vol_db), buf);
            }
          }

          // ═══ 水平音量条更新 ═══
          {
            int bar_val = (int)((float)id(volume_val) * 100.0f / (float)id(max_volume));
            if (bar_val > 100) bar_val = 100;
            if (lv_bar_get_value(id(bar_volume)) != bar_val) {
              lv_bar_set_value(id(bar_volume), bar_val, LV_ANIM_ON);
            }
          }

          // ═══ 主题强调色 ═══
          lv_color_t _accent = get_theme_accent(id(theme));

          // ═══ 平衡条更新 ═══
          {
            static int last_bal = 999;
            int bal = id(balance);
            if (bal != last_bal) {
              last_bal = bal;
              int dot_x = 210 + bal * 144 / 20;
              if (dot_x < 66) dot_x = 66;
              if (dot_x > 354) dot_x = 354;
              lv_obj_set_x(id(balance_dot), dot_x);
              lv_obj_set_style_text_color(id(lbl_bal_L),
                bal < 0 ? _accent : lv_color_hex(0x8E9FB8), LV_PART_MAIN);
              lv_obj_set_style_text_color(id(lbl_bal_R),
                bal > 0 ? _accent : lv_color_hex(0x8E9FB8), LV_PART_MAIN);
              if (bal == 0) {
                lv_label_set_text(id(lbl_balance_val), "平衡");
              } else {
                char buf[8];
                snprintf(buf, sizeof(buf), "%s%d", bal < 0 ? "L" : "R", abs(bal));
                lv_label_set_text(id(lbl_balance_val), buf);
              }
            }
          }

          // ═══ 输入源 LED + 图标着色 + LED 呼吸灯 (共享 cur 变量) ═══
          {
            static int last_input = -1;
            int cur = id(current_input);
            if (cur != last_input) {
              last_input = cur;
              for (int i = 0; i < 4; i++) {
                lv_obj_t* led = nullptr;
                switch (i) {
                  case 0: led = id(led_src_0); break;
                  case 1: led = id(led_src_1); break;
                  case 2: led = id(led_src_2); break;
                  case 3: led = id(led_src_3); break;
                }
                if (led && i != cur) {
                  lv_led_set_brightness(led, 0);
                }
              }
              lv_obj_set_style_text_color(id(lbl_src_radio),
                cur == 0 ? _accent : lv_color_hex(0x444444), LV_PART_MAIN);
              lv_obj_set_style_text_color(id(lbl_src_gamepad),
                cur == 1 ? _accent : lv_color_hex(0x444444), LV_PART_MAIN);
              lv_obj_set_style_text_color(id(lbl_src_laptop),
                cur == 2 ? _accent : lv_color_hex(0x444444), LV_PART_MAIN);
              lv_obj_set_style_text_color(id(lbl_src_music),
                cur == 3 ? _accent : lv_color_hex(0x444444), LV_PART_MAIN);
            }
            // ── LED 呼吸灯 + 信号强度指示 (嵌套在同作用域, 使用上方 cur) ──
            {
              static uint32_t breath_tick = 0;
              breath_tick++;
              // sin 周期约 5.2 秒 (2π/0.06 ≈ 105 帧)
              float breath = (sinf(breath_tick * 0.06f) + 1.0f) * 0.5f;
              int b;
              if (s_signal_avg > 80)                    // 信号强 → 常亮
                b = 255;
              else if (s_signal_avg > 5)                // 有信号 → 呼吸 (140~255)
                b = 140 + (int)(breath * 115.0f);
              else                                      // 无信号 → 微光
                b = 30;
              lv_obj_t* leds[] = { id(led_src_0), id(led_src_1), id(led_src_2), id(led_src_3) };
              for (int i = 0; i < 4; i++) {
                if (leds[i] && i == cur) {
                  lv_led_set_brightness(leds[i], b);
                }
              }
            }
          }

          // ═══ 温度值更新 (含变化检测) ═══
          {
            static float last_temp = -999.0f;
            float cur_temp = id(ntc_temp)->has_state() ? id(ntc_temp)->state : -999.0f;
            if (fabsf(cur_temp - last_temp) > 0.05f) {
              last_temp = cur_temp;
              char buf[8];
              if (id(ntc_temp)->has_state())
                snprintf(buf, sizeof(buf), "%.1f", id(ntc_temp)->state);
              else
                snprintf(buf, sizeof(buf), "--.-");
              lv_label_set_text(id(lbl_temp_value), buf);
            }
          }

          // ═══ 温度保护提示 (含变化检测) ═══
          {
            static bool last_protect = false;
            bool prot = id(temp_protect);
            if (prot != last_protect) {
              last_protect = prot;
              if (prot) {
                lv_obj_set_style_text_color(id(lbl_temp_value), lv_color_hex(0xFF0000), LV_PART_MAIN);
                lv_label_set_text(id(lbl_temp_value), "保护!");
              } else {
                // 恢复为主题 accent 色 (而非硬编码灰色)
                lv_color_t accents[] = {lv_color_hex(0x10B981), lv_color_hex(0xEF4444), lv_color_hex(0x3B82F6), lv_color_hex(0x8B5CF6), lv_color_hex(0x0071E3), lv_color_hex(0xCD9B4A), lv_color_hex(0x06B6D4), lv_color_hex(0xF97316)};
                lv_obj_set_style_text_color(id(lbl_temp_value), accents[id(theme)], LV_PART_MAIN);
              }
            }
          }

          // ═══ 静音指示 (含变化检测) ═══
          {
            static bool last_mute = false;
            bool mute_now = id(soft_mute);
            if (mute_now != last_mute) {
              last_mute = mute_now;
              lv_label_set_text(id(lbl_mute), mute_now ? "静音" : "");
            }
          }

          // ═══ WiFi 图标颜色 (含变化检测) ═══
          {
            static bool last_wifi = false;
            bool wifi_ok = wifi::global_wifi_component->is_connected();
            if (wifi_ok != last_wifi) {
              last_wifi = wifi_ok;
              lv_obj_set_style_text_color(id(lbl_wifi),
                wifi_ok ? _accent : lv_color_hex(0x333333), LV_PART_MAIN);
            }
          }

          // ═══ BLE 图标颜色 (含变化检测) ═══
          {
            static bool last_ble = false;
            bool ble_ok = id(ble_connected);
            if (ble_ok != last_ble) {
              last_ble = ble_ok;
              lv_obj_set_style_text_color(id(lbl_ble),
                ble_ok ? _accent : lv_color_hex(0x333333), LV_PART_MAIN);
            }
          }

          // ═══ BLE HID 遥控: 状态轮询 + 事件处理 + UI 更新 ═══
          {
            ble_hid_host::poll();

            // ── 开机自动重连已配对设备（一次性） ──
            {
              static bool auto_reconnect_tried = false;
              if (!auto_reconnect_tried && id(system_ready)) {
                auto_reconnect_tried = true;
                std::string bda = id(ble_remote_peer_bda);
                if (!bda.empty() && bda != "\"\"" && bda.length() >= 17) {
                  ble_hid_host::set_peer_bda_from_string(bda);
                  ble_hid_host::reconnect_enable();
                  id(ble_remote_scan_status) = "正在重连...";
                }
                // 初始化 BLE 遥控指示器: 有配对记录才显示(暗色等待), 否则隐藏
                bool has_peer = !bda.empty() && bda != "\"\"" && bda.length() >= 17;
                if (has_peer) {
                  lv_obj_remove_flag(id(lbl_ble_remote_indicator), LV_OBJ_FLAG_HIDDEN);
                  lv_obj_set_style_text_color(id(lbl_ble_remote_indicator), lv_color_hex(0x555555), LV_PART_MAIN);
                } else {
                  lv_obj_add_flag(id(lbl_ble_remote_indicator), LV_OBJ_FLAG_HIDDEN);
                }
              }
            }

            // ── 扫描结果 → 更新 ble_remote_page 设备列表 ──
            if (id(ble_remote_scanning)) {
              int count = ble_hid_host::get_discovered_device_count();
              if (count != id(ble_remote_device_count)) {
                id(ble_remote_device_count) = count;
                // 更新设备槽显示
                for (int i = 0; i < 3; i++) {
                  lv_obj_t* row_dev = (i == 0) ? id(ble_row_dev0) : (i == 1) ? id(ble_row_dev1) : id(ble_row_dev2);
                  lv_obj_t* lbl_dev = (i == 0) ? id(lbl_ble_dev0) : (i == 1) ? id(lbl_ble_dev1) : id(lbl_ble_dev2);
                  lv_obj_t* lbl_rssi = (i == 0) ? id(lbl_ble_rssi0) : (i == 1) ? id(lbl_ble_rssi1) : id(lbl_ble_rssi2);
                  if (i < count) {
                    ble_hid_host::DeviceInfo dev;
                    if (ble_hid_host::get_discovered_device(i, dev)) {
                      lv_label_set_text(lbl_dev, dev.name);
                      char rssi_buf[16];
                      snprintf(rssi_buf, sizeof(rssi_buf), "%ddBm", dev.rssi);
                      lv_label_set_text(lbl_rssi, rssi_buf);
                      lv_obj_remove_flag(row_dev, LV_OBJ_FLAG_HIDDEN);
                    } else {
                      lv_obj_add_flag(row_dev, LV_OBJ_FLAG_HIDDEN);
                    }
                  } else {
                    lv_obj_add_flag(row_dev, LV_OBJ_FLAG_HIDDEN);
                  }
                }
              }
              // 扫描结束后自动更新状态
              if (!ble_hid_host::is_scanning() && id(ble_remote_scanning)) {
                id(ble_remote_scanning) = false;
                if (ble_hid_host::is_connected()) {
                  id(ble_remote_scan_status) = "已连接: " + ble_hid_host::get_connected_name();
                } else if (id(ble_remote_device_count) > 0) {
                  id(ble_remote_scan_status) = "发现" + std::to_string(id(ble_remote_device_count)) + "个设备";
                } else {
                  id(ble_remote_scan_status) = "未发现设备";
                }
              }
            }

            // ── 连接状态变化 → 更新 status 文字 + BDA 持久化 ──
            {
              static bool last_connected = false;
              bool connected = ble_hid_host::is_connected();
              if (connected != last_connected) {
                last_connected = connected;
                id(ble_remote_connected) = connected;
                if (connected) {
                  id(ble_remote_scan_status) = "已连接: " + ble_hid_host::get_connected_name();
                  // 电池电量
                  { int b = ble_hid_host::get_battery_level(); if (b >= 0) { char buf[16]; snprintf(buf, sizeof(buf), " 电池: %d%%", b); id(ble_remote_scan_status) += buf; } }
                  // 持久化 BDA
                  std::string bda = ble_hid_host::get_peer_bda_string();
                  if (!bda.empty()) id(ble_remote_peer_bda) = bda;
                } else {
                  id(ble_remote_scan_status) = "未连接";
                }
                // 更新设置页导航状态文字 ("蓝牙遥控" 行)
                lv_label_set_text(id(lbl_ble_status_nav), connected ? "已连接" : "未连接");
                // 更新 main_page BLE 遥控指示器颜色与显隐
                bool has_peer = !id(ble_remote_peer_bda).empty() && id(ble_remote_peer_bda) != "\"\"";
                if (connected || has_peer) {
                  lv_obj_remove_flag(id(lbl_ble_remote_indicator), LV_OBJ_FLAG_HIDDEN);
                  lv_obj_set_style_text_color(id(lbl_ble_remote_indicator),
                    connected ? _accent : lv_color_hex(0x555555), LV_PART_MAIN);
                } else {
                  lv_obj_add_flag(id(lbl_ble_remote_indicator), LV_OBJ_FLAG_HIDDEN);
                }
                // 更新 ble_remote_page 返回按钮文字（断开留在本页，不返回设置）
                lv_label_set_text(id(lbl_ble_back), connected ? "断开" : "返回设置");
              }
              // 周期性更新 ble_remote_page 状态标签
              if (lv_scr_act() == id(ble_remote_page)->obj) {
                // 检查电池更新
                if (connected) {
                  int b = ble_hid_host::get_battery_level();
                  if (b >= 0) {
                    id(ble_remote_battery) = b;
                    static int last_batt = -2;
                    if (b != last_batt) {
                      last_batt = b;
                      id(ble_remote_scan_status) = "已连接: " + ble_hid_host::get_connected_name();
                      char buf[16]; snprintf(buf, sizeof(buf), " 电池: %d%%", b);
                      id(ble_remote_scan_status) += buf;
                    }
                  }
                }
                lv_label_set_text(id(lbl_ble_status), id(ble_remote_scan_status).c_str());
              }

              // 诊断页自动刷新 (heap/psram/uptime)
              if (lv_scr_act() == id(debug_page)->obj) {
                static uint32_t last_update = 0;
                uint32_t now = millis();
                if (now - last_update > 2000) {  // 每 2 秒刷新一次
                  last_update = now;
                  char buf[64];

                  // Free internal heap
                  uint32_t free_internal = esp_get_free_heap_size();
                  uint32_t total_internal = heap_caps_get_total_size(MALLOC_CAP_INTERNAL);
                  snprintf(buf, sizeof(buf), "内部堆: %u / %u KB",
                    (unsigned)(free_internal / 1024), (unsigned)(total_internal / 1024));
                  lv_label_set_text(id(lbl_dbg_heap), buf);

                  // Min free heap (all-time low watermark)
                  uint32_t min_free = esp_get_minimum_free_heap_size();
                  snprintf(buf, sizeof(buf), "最小空闲: %u KB  (全时段低水位)",
                    (unsigned)(min_free / 1024));
                  lv_label_set_text(id(lbl_dbg_minheap), buf);

                  // Free PSRAM
                  uint32_t free_psram = heap_caps_get_free_size(MALLOC_CAP_SPIRAM);
                  uint32_t total_psram = heap_caps_get_total_size(MALLOC_CAP_SPIRAM);
                  snprintf(buf, sizeof(buf), "PSRAM: %u / %u KB",
                    (unsigned)(free_psram / 1024), (unsigned)(total_psram / 1024));
                  lv_label_set_text(id(lbl_dbg_psram), buf);

                  // Min free PSRAM
                  uint32_t min_psram = heap_caps_get_minimum_free_size(MALLOC_CAP_SPIRAM);
                  snprintf(buf, sizeof(buf), "PSRAM最小空闲: %u KB",
                    (unsigned)(min_psram / 1024));
                  lv_label_set_text(id(lbl_dbg_minpsram), buf);

                  // Uptime
                  uint32_t ms = now;
                  unsigned long days = ms / 86400000UL;
                  unsigned long hours = (ms % 86400000UL) / 3600000UL;
                  unsigned long mins = (ms % 3600000UL) / 60000UL;
                  unsigned long secs = (ms % 60000UL) / 1000UL;
                  snprintf(buf, sizeof(buf), "运行: %lud %luh %lum %lus", days, hours, mins, secs);
                  lv_label_set_text(id(lbl_dbg_uptime), buf);
                }
              }
            }

            // ── HID 按键事件处理 ──
            while (ble_hid_host::has_event()) {
              auto evt = ble_hid_host::pop_event();
              // 记录原始事件用于调试
              if (ble_hid_host::has_raw_event()) {
                std::string raw_str = ble_hid_host::get_last_raw_event_string();
                ESP_LOGD("ble_hid", "原始HID事件: %s", raw_str.c_str());
                lv_label_set_text(id(lbl_ble_hid_event), raw_str.c_str());
                ble_hid_host::clear_raw_event();
              }
              const char* ha_event_name = "";
              // ── 应用用户按键映射 ──
              {
                int mapped = (int)evt.type;
                switch (evt.type) {
                  case 1: mapped = id(key_map_1); break;
                  case 2: mapped = id(key_map_2); break;
                  case 3: mapped = id(key_map_3); break;
                  case 4: mapped = id(key_map_4); break;
                  case 5: mapped = id(key_map_5); break;
                  case 6: mapped = id(key_map_6); break;
                  case 7: mapped = id(key_map_7); break;
                  case 8: mapped = id(key_map_8); break;
                  case 9: mapped = id(key_map_9); break;
                  case 10: mapped = id(key_map_10); break;
                  case 11: mapped = id(key_map_11); break;
                  case 12: mapped = id(key_map_12); break;
                  case 13: mapped = id(key_map_13); break;
                  case 14: mapped = id(key_map_14); break;
                }
                if (mapped == 0) continue;  // 禁用此按键
                evt.type = (ble_hid_host::HidEventType)mapped;
              }
              switch (evt.type) {
                case ble_hid_host::HID_EVT_VOLUME_UP:
                  if (id(standby) || !id(system_ready) || id(switching_input)) break;
                  if (id(volume_val) < id(max_volume)) { id(volume_val) = id(volume_val) + 1; }
                  id(last_v_change_ms) = millis();
                  id(send_volume_to_pga)->execute();
                  ha_event_name = "VOLUME_UP";
                  break;
                case ble_hid_host::HID_EVT_VOLUME_DOWN:
                  if (id(standby) || !id(system_ready) || id(switching_input)) break;
                  if (id(volume_val) > 0) { id(volume_val) = id(volume_val) - 1; }
                  id(last_v_change_ms) = millis();
                  id(send_volume_to_pga)->execute();
                  ha_event_name = "VOLUME_DOWN";
                  break;
                case ble_hid_host::HID_EVT_MUTE:
                  if (id(standby) || !id(system_ready)) break;
                  id(soft_mute_switch)->toggle();
                  ha_event_name = "MUTE";
                  break;
                case ble_hid_host::HID_EVT_PLAY_PAUSE:
                  if (id(standby) || !id(system_ready)) break;
                  id(media_select)->publish_state("播放");
                  id(media_reset)->execute();
                  ha_event_name = "PLAY_PAUSE";
                  break;
                case ble_hid_host::HID_EVT_NEXT_TRACK:
                  if (id(standby) || !id(system_ready)) break;
                  id(media_select)->publish_state("下一首");
                  id(media_reset)->execute();
                  ha_event_name = "NEXT_TRACK";
                  break;
                case ble_hid_host::HID_EVT_PREV_TRACK:
                  if (id(standby) || !id(system_ready)) break;
                  id(media_select)->publish_state("上一首");
                  id(media_reset)->execute();
                  ha_event_name = "PREV_TRACK";
                  break;
                case ble_hid_host::HID_EVT_POWER:
                  if (id(standby)) { id(standby_switch)->turn_on(); }
                  else { id(standby_switch)->turn_off(); }
                  ha_event_name = "POWER";
                  break;
                case ble_hid_host::HID_EVT_CYCLE_INPUT: {
                  if (id(standby) || !id(system_ready)) break;
                  if (millis() - id(last_switch_ms) < 1500) break;
                  id(last_switch_ms) = millis();
                  id(current_input) = (id(current_input) + 1) % 4;
                  const char* in_names[] = {"CD", "DAC", "PC", "AUX"};
                  id(input_select)->publish_state(in_names[id(current_input)]);
                  id(switch_input)->execute();
                  ha_event_name = "CYCLE_INPUT";
                  break;
                }
                case ble_hid_host::HID_EVT_SWIPE_UP:
                  ESP_LOGD("ble_hid", "SWIPE_UP (mapped action)");
                  ha_event_name = "SWIPE_UP";
                  break;
                case ble_hid_host::HID_EVT_SWIPE_DOWN:
                  ESP_LOGD("ble_hid", "SWIPE_DOWN (mapped action)");
                  ha_event_name = "SWIPE_DOWN";
                  break;
                case ble_hid_host::HID_EVT_SWIPE_LEFT:
                  ESP_LOGD("ble_hid", "SWIPE_LEFT (mapped action)");
                  ha_event_name = "SWIPE_LEFT";
                  break;
                case ble_hid_host::HID_EVT_SWIPE_RIGHT:
                  ESP_LOGD("ble_hid", "SWIPE_RIGHT (mapped action)");
                  ha_event_name = "SWIPE_RIGHT";
                  break;
                case ble_hid_host::HID_EVT_CAMERA:
                  ESP_LOGD("ble_hid", "CAMERA (mapped action)");
                  ha_event_name = "CAMERA";
                  break;
                case ble_hid_host::HID_EVT_CAMERA_SWITCH:
                  ESP_LOGD("ble_hid", "CAMERA_SWITCH (mapped action)");
                  ha_event_name = "CAMERA_SWITCH";
                  break;
                case ble_hid_host::HID_EVT_OK:
                  ESP_LOGD("ble_hid", "OK (mapped action)");
                  ha_event_name = "OK";
                  break;
                case ble_hid_host::HID_EVT_CONNECTED:
                  id(ble_remote_connected) = true;
                  ha_event_name = "CONNECTED";
                  break;
                case ble_hid_host::HID_EVT_DISCONNECTED:
                  id(ble_remote_battery) = -1;
                  id(ble_remote_connected) = false;
                  ha_event_name = "DISCONNECTED";
                  break;
              }
              // 推送 HA 事件
              if (ha_event_name[0] && evt.type < 0x10) {  // 只推送用户按键事件（非内部事件）
                id(ble_hid_event_text).publish_state(ha_event_name);
              }
            }
          }

          // ═══ 自动切换图标颜色 (含变化检测) ═══
          {
            static bool last_auto_switch = false;
            bool auto_now = id(auto_input);
            if (auto_now != last_auto_switch) {
              last_auto_switch = auto_now;
              lv_obj_set_style_text_color(id(lbl_auto_switch),
                auto_now ? _accent : lv_color_hex(0x444444), LV_PART_MAIN);
            }
          }

          // ═══ 频谱页: 输入源图标 + 名称更新 (含变化检测) ═══
          {
            static int last_spec_input = -1;
            int cur = id(current_input);
            if (cur != last_spec_input) {
              last_spec_input = cur;
              const char* names[] = {"CD", "DAC", "PC", "AUX"};
              const char* icons[] = {"\U000F0960", "\U000F061A", "\U000F0322", "\U000F186C"};
              lv_label_set_text(id(lbl_spec_input), names[cur]);
              lv_label_set_text(id(lbl_spec_input_icon), icons[cur]);
            }
          }
          // ═══ 频谱页: 温度更新 (含变化检测) ═══
          {
            static float last_spec_temp = -999.0f;
            float cur_temp = id(ntc_temp)->has_state() ? id(ntc_temp)->state : -999.0f;
            if (fabsf(cur_temp - last_spec_temp) > 0.05f) {
              last_spec_temp = cur_temp;
              char buf[16];
              if (id(ntc_temp)->has_state())
                snprintf(buf, sizeof(buf), "%.1f°C", id(ntc_temp)->state);
              else
                snprintf(buf, sizeof(buf), "--.-°C");
              lv_label_set_text(id(lbl_spec_temp), buf);
            }
          }

          // ═══ 音量浮层标签更新 (含变化检测) ═══
          {
            static float last_big_db = -999.0f;
            float reg_f = (float)id(volume_val);
            float db = (reg_f < 1.0f) ? -96.0f : (reg_f - 192.0f) * 0.5f;
            if (fabsf(db - last_big_db) > 0.01f) {
              last_big_db = db;
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1fdB", db);
              lv_label_set_text(id(lbl_vol_big), buf);
            }
          }

          // ═══ 设置页: IP 地址更新 (含变化检测) ═══
          {
            static std::string last_ip;
            std::string new_ip;
            if (id(device_ip)->state.empty()) {
              new_ip = "---.---.---.---";
            } else {
              new_ip = id(device_ip)->state;
            }
            if (new_ip != last_ip) {
              last_ip = new_ip;
              lv_label_set_text(id(lbl_ip_address), new_ip.c_str());
            }
          }

          // ═══ LED 指示灯: 多状态 PWM 控制 (IO16, LEDC 1kHz) ═══
          //   状态优先级 (高→低):
          //     温度保护快闪 → 待机呼吸 → 未连WiFi闪烁 →
          //     静音半亮 → 开机常亮
          //   复杂度: 低 (单变量, 无锁)
          {
            static uint32_t standby_entry_ms = 0;
            static uint32_t fw_hold_start = 0;     // 工厂重置按键计时
            float lvl = 0.0f;
            bool fw_active = false;
            uint32_t fw_hold_dur = 0;
            uint32_t n = millis();

            // 待机进出跟踪
            if (!id(standby)) {
              standby_entry_ms = 0;
            } else if (standby_entry_ms == 0) {
              standby_entry_ms = n;   // 记录进入待机时间戳
            }

            // 工厂重置按键跟踪 (5s 后 LED 开始加速闪烁反馈)
            {
              bool pressed = id(encoder_button).state;
              if (pressed) {
                if (fw_hold_start == 0) fw_hold_start = n;
                fw_hold_dur = n - fw_hold_start;
                if (fw_hold_dur >= 5000 && fw_hold_dur < 10000) fw_active = true;
              } else {
                fw_hold_start = 0;
              }
            }

            // 优先级 1: 温度保护 (≥72°C) → 快闪 200ms 周期
            if (id(temp_protect)) {
              lvl = (n % 200 < 100) ? 0.80f : 0.0f;
            }
            // 优先级 1b: 工厂重置按住 5~10s → 加速闪烁 (500ms→100ms)
            else if (fw_active) {
              float progress = (float)(fw_hold_dur - 5000) / 5000.0f;
              uint32_t period = 500 - (uint32_t)(progress * 400.0f);
              if (period < 50) period = 50;
              lvl = ((n - fw_hold_start) % period < period / 2) ? 0.80f : 0.0f;
            }
            // 优先级 2: 待机
            else if (id(standby)) {
              uint32_t dur = n - standby_entry_ms;
              if (dur >= 3600000) {
                // 待机 >1小时: 每5分钟平滑脉冲 2 秒, 最大 30%
                uint32_t mod = n % 300000;
                if (mod < 2000) {
                  float t = (float)mod / 2000.0f;
                  lvl = 0.30f * (sinf(t * M_PI - M_PI_2) + 1.0f) * 0.5f;
                }
                // else lvl 保持 0.0
              } else {
                // 待机 <1小时: 柔呼吸 3s 周期, 5%~55%
                float t = fmod((float)n, 3000.0f) / 3000.0f;
                lvl = 0.05f + 0.50f * (sinf(t * 2.0f * M_PI - M_PI_2) + 1.0f) * 0.5f;
              }
            }
            // 优先级 3: 开机闪屏期间 → 1 秒内渐亮到 70%
            else if (lv_scr_act() == id(splash_page)->obj) {
              float t = (float)n / 1000.0f;
              lvl = (t > 1.0f) ? 0.70f : t * 0.70f;
            }
            // 优先级 4: 未连 WiFi → 闪烁 1s 周期
            else if (!wifi::global_wifi_component->is_connected()) {
              lvl = (n % 1000 < 500) ? 0.70f : 0.0f;
            }
            // 优先级 5: 静音中 → 常亮 35%
            else if (id(soft_mute)) {
              lvl = 0.35f;
            }
            // 优先级 6: 正常 → 常亮 70%
            else {
              lvl = 0.70f;
            }

            // 变化检测写入 (避免每 50ms 刷输出)
            static float last_lvl = -1.0f;
            if (fabs(lvl - last_lvl) > 0.005f) {
              last_lvl = lvl;
              id(led_indicator)->set_level(lvl);
            }
          }
          

binary_sensor:
  - platform: gpio
    name: "编码器按键"
    id: encoder_button
    pin:
      number: GPIO8
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    internal: true

    on_multi_click:
      # 三击 → 固件版本隐藏入口 (先于双击匹配, 防止三击被拦截)
      - timing:
          - ON for at most 400ms
          - OFF for at most 400ms
          - ON for at most 400ms
          - OFF for at most 400ms
          - ON for at most 400ms
          - OFF for at least 300ms
        then:
          # 三击：固件版本行隐藏入口 → 跳转诊断页 (仅在设置页焦点Row 10生效)
          - if:
              condition:
                lambda: >-
                  return lv_scr_act() == id(settings_page)->obj &&
                         id(settings_focus_idx) == 10;  // Row 10=固件版本
              then:
                - lambda: |-
                    id(debug_focus_idx) = 0;
                    // 初始化焦点视觉: Row 0 (重校准) 高亮, Row 1 (返回) 恢复
                    {
                      lv_color_t hl = get_theme_accent(id(theme));
                      lv_obj_set_style_border_width(id(dbg_row_recal), 3, LV_PART_MAIN);
                      lv_obj_set_style_border_color(id(dbg_row_recal), hl, LV_PART_MAIN);
                      lv_obj_set_style_border_side(id(dbg_row_recal), LV_BORDER_SIDE_LEFT, LV_PART_MAIN);
                      lv_obj_set_style_bg_color(id(dbg_row_recal), lv_color_hex(0x1E2D42), LV_PART_MAIN);
                      lv_obj_set_style_border_width(id(dbg_row_back), 0, LV_PART_MAIN);
                      lv_obj_set_style_bg_color(id(dbg_row_back), lv_color_hex(0x111827), LV_PART_MAIN);
                    }
                    id(last_display_interaction) = millis();
                    lv_scr_load_anim(id(debug_page)->obj, LV_SCR_LOAD_ANIM_FADE_IN, 200, 0, false);

      # 双击 → 静音切换 (仅主页/频谱页/大字音量页有效)
      - timing:
          - ON for at most 400ms
          - OFF for at most 400ms
          - ON for at most 400ms
          - OFF for at least 300ms
        then:
          - if:
              condition:
                lambda: >-
                  lv_obj_t* _a = lv_scr_act();
                  return _a == id(main_page)->obj ||
                         _a == id(spectrum_page)->obj ||
                         _a == id(volume_big_page)->obj;
              then:
                - switch.toggle: soft_mute_switch
                - script.execute: reset_idle_timer

      # 单击 → 唤醒屏幕 | 频谱页返回主页 | 设置页切换浏览/调节模式
      - timing:
          - ON for at most 500ms
          - OFF for at least 150ms
        then:
          - if:
              condition:
                lambda: 'return id(display_is_off);'
              then:
                - script.execute: reset_idle_timer
              else:
                - if:
                    condition:
                      lvgl.page.is_showing: settings_page
                    then:
                      # 设置页：单击切换浏览/调节模式（只读项无反应）
                      - lambda: |-
                          lv_obj_t** rows = settings_ui::rows();
                          lv_obj_t** bars = settings_ui::bars();
                          // bar_base_heights defined in settings_ui.h
                          int idx = id(settings_focus_idx);
                          if (id(settings_active_idx) < 0) {
                            // 进入调节模式（Row 8/9: 蓝牙遥控/遥控器按键为导航项，跳转页面）
                            if (idx == 8) {
                              id(ble_remote_focus_idx) = 0;
                              id(ble_remote_device_count) = 0;
                              id(ble_remote_scan_status) = ble_hid_host::is_connected() ? "已连接: " + ble_hid_host::get_connected_name() : "未连接";
                              id(ble_remote_connected) = ble_hid_host::is_connected();
                              id(last_display_interaction) = millis();
                              lv_scr_load_anim(id(ble_remote_page)->obj, LV_SCR_LOAD_ANIM_FADE_IN, 200, 0, false);
                              return;
                            }
                            if (idx == 9) {
                              id(keymap_focus_idx) = 0;
                              id(last_display_interaction) = millis();
                              lv_scr_load_anim(id(remote_keys_page)->obj, LV_SCR_LOAD_ANIM_FADE_IN, 200, 0, false);
                              return;
                            }
                            if (idx == 10 || idx == 11) return;  // 只读项(固件版本/IP地址)不进调节
                            id(settings_active_idx) = idx;
                            lv_obj_set_style_bg_color(rows[idx], lv_color_hex(0x25374F), LV_PART_MAIN);
                            lv_obj_set_style_border_width(rows[idx], 3, LV_PART_MAIN);
                            if (bars[idx]) lv_obj_set_height(bars[idx], 24);
                          } else {
                            // 退出调节模式（确认修改，值已在调节时实时生效）
                            id(settings_active_idx) = -1;
                            lv_obj_set_style_bg_color(rows[idx], lv_color_hex(0x1E2D42), LV_PART_MAIN);
                            lv_obj_set_style_border_width(rows[idx], 3, LV_PART_MAIN);
                            if (bars[idx]) lv_obj_set_height(bars[idx], settings_ui::bar_base_heights[idx]);
                          }
                      - script.execute: reset_idle_timer
                    else:
                      - if:
                          condition:
                            lvgl.page.is_showing: ble_remote_page
                          then:
                            # 蓝牙遥控页：单击激活焦点项
                            - lambda: |-
                                int f = id(ble_remote_focus_idx);
                                if (f == 0) {
                                  // 扫描/停止扫描
                                  if (id(ble_remote_scanning)) {
                                    ble_hid_host::stop_scan();
                                    id(ble_remote_scanning) = false;
                                    id(ble_remote_scan_status) = ble_hid_host::is_connected() ? "已连接: " + ble_hid_host::get_connected_name() : "未连接";
                                  } else {
                                    ble_hid_host::start_scan();
                                    id(ble_remote_scanning) = true;
                                    id(ble_remote_device_count) = 0;
                                    id(ble_remote_scan_status) = "扫描中...";
                                  }
                                } else if (f >= 1 && f <= 3) {
                                  // 连接设备 (f-1 = 设备索引)
                                  int dev_idx = f - 1;
                                  int count = id(ble_remote_device_count);
                                  if (dev_idx < count) {
                                    id(ble_remote_scan_status) = "正在连接...";
                                    ble_hid_host::connect(dev_idx);
                                  }
                                } else if (f == 4) {
                                  // 已连接→断开（留在蓝牙页），未连接→返回设置
                                  if (ble_hid_host::is_connected()) {
                                    ble_hid_host::disconnect();
                                    id(ble_remote_peer_bda) = "\"\"";
                                    id(ble_remote_battery) = -1;
                                    id(ble_remote_connected) = false;
                                    id(ble_remote_scan_status) = "未连接";
                                  } else {
                                    lv_scr_load_anim(id(settings_page)->obj, LV_SCR_LOAD_ANIM_FADE_IN, 200, 0, false);
                                  }
                                }
                            - script.execute: reset_idle_timer
                          else:
                            - if:
                                condition:
                                  lvgl.page.is_showing: remote_keys_page
                                then:
                                  # 遥控器按键页：单击切换浏览/调节模式
                                  - lambda: |-
                                      int f = id(keymap_focus_idx);
                                      int act = id(keymap_active_idx);
                                      if (f >= 0 && f <= 7) {
                                        if (act < 0) {
                                          // 浏览→调节：记录当前行, 高亮背景
                                          id(keymap_active_idx) = f;
                                          lv_obj_t* rows_k[] = {
                                            id(keymap_row_0), id(keymap_row_1), id(keymap_row_2),
                                            id(keymap_row_3), id(keymap_row_4), id(keymap_row_5),
                                            id(keymap_row_6), id(keymap_row_7)
                                          };
                                          lv_obj_set_style_bg_color(rows_k[f], lv_color_hex(0x25374F), LV_PART_MAIN);
                                        } else {
                                          // 调节→浏览：确认修改, 恢复背景
                                          id(keymap_active_idx) = -1;
                                          lv_obj_t* rows_k[] = {
                                            id(keymap_row_0), id(keymap_row_1), id(keymap_row_2),
                                            id(keymap_row_3), id(keymap_row_4), id(keymap_row_5),
                                            id(keymap_row_6), id(keymap_row_7)
                                          };
                                          lv_obj_set_style_bg_color(rows_k[f], lv_color_hex(0x1E2D42), LV_PART_MAIN);
                                        }
                                      } else if (f == 8) {
                                        id(keymap_active_idx) = -1;
                                        lv_scr_load_anim(id(settings_page)->obj, LV_SCR_LOAD_ANIM_FADE_IN, 200, 0, false);
                                      }
                                  - script.execute: reset_idle_timer
                                else:
                                  - if:
                                      condition:
                                        lvgl.page.is_showing: debug_page
                                      then:
                                        # 诊断页：单击 → 根据焦点执行操作
                                        - lambda: |-
                                            if (id(debug_focus_idx) == 0) {
                                              // 重校准
                                              bool ok = msgeq7::recalibrate();
                                              lv_label_set_text(id(lbl_dbg_recal), ok ? "校准完成" : "校准失败");
                                            }
                                        - script.execute: reset_idle_timer
                                        - lvgl.page.show:
                                            id: settings_page
                                            animation: LV_SCREEN_LOAD_ANIM_FADE_IN
                                            time: 200ms
                                      else:
                                        - if:
                                            condition:
                                              lvgl.page.is_showing: spectrum_page
                                            then:
                                              - lvgl.page.show:
                                                  id: main_page
                                                  animation: LV_SCREEN_LOAD_ANIM_FADE_IN
                                                  time: 200ms
                                            else:
                                              - if:
                                                  condition:
                                                    lvgl.page.is_showing: main_page
                                                  then:
                                                    # 主页单击 → 进入设置页
                                                    - lambda: |-
                                                        id(settings_focus_idx) = 0;
                                                        id(settings_active_idx) = -1;
                                                        settings_ui::init(
                                                          (lv_obj_t*)id(row_max_vol), (lv_obj_t*)id(row_power_on),
                                                          (lv_obj_t*)id(row_balance), (lv_obj_t*)id(row_input),
                                                          (lv_obj_t*)id(row_auto_switch), (lv_obj_t*)id(row_brightness),
                                                          (lv_obj_t*)id(row_timeout), (lv_obj_t*)id(row_theme),
                                                          (lv_obj_t*)id(row_ble_remote), (lv_obj_t*)id(row_keymap),
                                                          (lv_obj_t*)id(row_firmware), (lv_obj_t*)id(row_ip),
                                                          (lv_obj_t*)id(bar_max_vol), (lv_obj_t*)id(bar_power_on_limit),
                                                          (lv_obj_t*)id(bar_balance),
                                                          (lv_obj_t*)id(bar_brightness), (lv_obj_t*)id(bar_display_timeout)
                                                        );
                                                        lv_obj_t** rows = settings_ui::rows();
                                                        for (int i = 0; i < settings_ui::N; i++) {
                                                          lv_obj_set_style_border_width(rows[i], 0, LV_PART_MAIN);
                                                          lv_obj_set_style_bg_color(rows[i],
                                                            i < 8 ? lv_color_hex(0x162032) : lv_color_hex(0x111827), LV_PART_MAIN);
                                                        }
                                                        lv_obj_set_style_border_width(rows[0], 3, LV_PART_MAIN);
                                                        lv_color_t colors[] = {lv_color_hex(0x10B981), lv_color_hex(0xEF4444), lv_color_hex(0x3B82F6), lv_color_hex(0x8B5CF6), lv_color_hex(0x0071E3), lv_color_hex(0xCD9B4A), lv_color_hex(0x06B6D4), lv_color_hex(0xF97316)};
                                                        lv_obj_set_style_border_color(rows[0], colors[id(theme)], LV_PART_MAIN);
                                                        lv_obj_set_style_border_side(rows[0], LV_BORDER_SIDE_LEFT, LV_PART_MAIN);
                                                        lv_obj_set_style_bg_color(rows[0], lv_color_hex(0x1E2D42), LV_PART_MAIN);
                                                        lv_obj_scroll_to_view(rows[0], LV_ANIM_OFF);
                                                    - lvgl.page.show:
                                                        id: settings_page
                                                        animation: LV_SCREEN_LOAD_ANIM_FADE_IN
                                                        time: 200ms
                                                  else:
                                                    # 其他页面短按由 encoder enter_button 自动处理
                                                    - script.execute: reset_idle_timer

      # 长按 → 设置页/蓝牙遥控页返回主页面，其他页面待机/唤醒。
      # 直接操作 standby 全局变量而非 switch 状态，避免 switch 内部状态不一致。
      - timing:
          - ON for at least 1500ms
        then:
          - if:
              condition:
                lambda: 'return lv_scr_act() == id(settings_page)->obj || lv_scr_act() == id(ble_remote_page)->obj || lv_scr_act() == id(debug_page)->obj || lv_scr_act() == id(remote_keys_page)->obj;'
              then:
                # 设置页/蓝牙遥控页/诊断页长按 → 返回主页面（不触发待机）
                - lvgl.page.show:
                    id: main_page
                    animation: LV_SCREEN_LOAD_ANIM_FADE_IN
                    time: 200ms
              else:
                - if:
                    condition:
                      lambda: 'return id(standby);'
                    then:
                      - script.execute: exit_standby
                    else:
                      - if:
                          condition:
                            lambda: 'return id(system_ready);'
                          then:
                            - script.execute: enter_standby
                          else:
                            - script.execute: start_wifi_ap

  # ── 音频检测 (MCP23017 GPB0~GPB3, 高电平=有信号) ──
  - platform: gpio
    name: "音频检测-CD"
    id: audio_cd
    pin:
      mcp23xxx: mcp23017_hub
      number: 8
      mode:
        input: true
        pullup: true
      inverted: true          # 检测到信号时引脚被拉低
    filters:
      - delayed_on: 100ms
      - delayed_off: 500ms
    on_press:
      then:
        - script.execute: auto_switch_input
    on_release:
      then:
        - script.execute: auto_switch_input

