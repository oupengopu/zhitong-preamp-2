                  y: 1
                  bg_color: 0x333333
                  indicator:
                    bg_color: !lambda |-
                      int batt = id(ble_remote_battery);
                      if (!id(ble_remote_connected) || batt < 0) return lv_color_hex(0x333333);
                      if (batt > 50) {
                        switch (id(theme)) {
                          case 1: return lv_color_hex(0xEF4444);
                          case 2: return lv_color_hex(0x3B82F6);
                          case 3: return lv_color_hex(0x8B5CF6);
                          case 4: return lv_color_hex(0x0071E3);
                          case 5: return lv_color_hex(0xCD9B4A);
                          case 6: return lv_color_hex(0x06B6D4);
                          case 7: return lv_color_hex(0xF97316);
                          default: return lv_color_hex(0x10B981);
                        }
                      }
                      if (batt > 20) return lv_color_hex(0xFBBF24);
                      return lv_color_hex(0xEF4444);
