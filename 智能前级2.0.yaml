                    then:
                      - lambda: |-
                          uint8_t idx = x;
                          if (idx > 3) return;
                          uint32_t now = millis();
                          if (now - id(last_switch_ms) < 1500) return;
                          id(last_switch_ms) = now;
                          if (id(current_input) != (int)idx) {
                            id(current_input) = (int)idx;
