# ═══════════════════════════════════════════════════════════════
# 脚本
# ═══════════════════════════════════════════════════════════════
script:
  - id: media_reset
    mode: restart
    then:
      - delay: 300ms
      - lambda: |-
          id(media_select)->publish_state("空闲");

  - id: start_wifi_ap
    mode: restart
    then:
      - lambda: 'wifi::global_wifi_component->clear_sta();'
      - delay: 2s
      - lambda: 'App.safe_reboot();'

  # ── 待机：关屏 + 静音 + 暂停 LVGL，WiFi 保持连接（HA 可远程唤醒） ──
  - id: enter_standby
    mode: restart
    then:
      - script.stop: display_idle_timer
      - lambda: |-
          id(saved_soft_mute) = id(soft_mute);
          id(soft_mute)       = true;
          id(target_db)       = -96.0f;
          id(mute_switch)->turn_off();
          id(display_backlight)->turn_off();
          pga2311::set_volume(0, 0);
          id(current_db)   = -96.0f;
          id(system_ready) = false;
          id(standby)      = true;
          id(standby_switch)->publish_state(false);  // HA 同步
      - lvgl.pause:
      - delay: 100ms

  # ── 退出待机 ──
  - id: exit_standby
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(standby);'
          then:
            - lambda: 'ESP_LOGD("standby", "Already awake, exit_standby skipped");'
          else:
            - script.stop: display_idle_timer
            - lambda: |-
                id(standby)    = false;
                id(last_manual_input_ms) = 0;   // 退出待机 → 重新启用自动选择
                id(soft_mute)  = id(saved_soft_mute);
                id(current_db) = -96.0f;
                id(target_db)  = -96.0f;
                pga2311::set_volume(0, 0);
                if (id(volume_val) > id(power_on_limit)) id(volume_val) = id(power_on_limit);
                id(standby_switch)->publish_state(true);  // HA 同步
            - light.turn_on:
                id: display_backlight
                transition_length: 800ms  # 渐亮 800ms
            - lvgl.resume:
            - delay: 2s
            - script.execute: switch_input
            - wait_until:
                condition:
                  lambda: 'return !id(switch_input)->is_running();'
            - script.execute: apply_theme    # ★ 待机恢复后应用主题色
            - lambda: 'id(system_ready) = true;'
            - lvgl.page.show: main_page
            - script.execute: display_idle_timer

  - id: reset_idle_timer
    mode: restart
    then:
      - lambda: |-
          if (id(display_is_off) && !id(standby)) {
            id(display_backlight)->turn_on();
            id(display_is_off) = false;
          }
          id(last_display_interaction) = millis();
      - lvgl.resume:
      - if:
          condition:
            lambda: 'return id(system_ready) && !id(standby);'
          then:
            - lvgl.page.show:
                id: main_page
                animation: LV_SCREEN_LOAD_ANIM_FADE_IN
                time: 200ms

  - id: display_idle_timer
    mode: restart
    then:
      - lambda: 'id(last_display_interaction) = millis();'
      - while:
          condition:
            lambda: 'return !id(standby);'
          then:
            - delay: 1s
            - lambda: |-
                uint32_t now = millis();
                uint32_t elapsed = now - id(last_display_interaction);
                uint32_t timeout_ms = id(display_timeout_min) * 60000u;
                if (!id(display_is_off) && elapsed >= timeout_ms) {
                  id(display_backlight)->turn_off();
                  id(display_is_off) = true;
                }
            - if:
                condition:
                  lambda: 'return id(display_is_off);'
                then:
                  - lvgl.pause:

  # ══════════════════════════════════════════════════════════════
  # show_volume_big: 音量大字体浮层 (2秒后自动返回主页)
  # ══════════════════════════════════════════════════════════════
  - id: show_volume_big
    mode: restart
    then:
      - lambda: |-
          if (id(display_is_off) && !id(standby)) {
            id(display_backlight)->turn_on();
            id(display_is_off) = false;
          }
          id(last_display_interaction) = millis();
      - lvgl.resume:
      - lvgl.page.show:
          id: volume_big_page
          animation: LV_SCREEN_LOAD_ANIM_FADE_IN
          time: 150ms
      - lambda: |-
          float vol_pct = (float)id(volume_val) / (float)id(max_volume);
          if (vol_pct > 1.0f) vol_pct = 1.0f;
          float reg_f = vol_pct * 255.0f;
          float db = (reg_f < 1.0f) ? -96.0f : (reg_f - 255.0f) * 0.5f;
          char buf[16];
          snprintf(buf, sizeof(buf), "%.1fdB", db);
          lv_label_set_text(id(lbl_vol_big), buf);

      # 2 秒后自动返回主页（mode: restart 确保每次旋转都重置计时）
      - delay: 2s
      - lvgl.page.show:
          id: main_page
          animation: LV_SCREEN_LOAD_ANIM_FADE_IN
          time: 150ms

  # ══════════════════════════════════════════════════════════════
  # ★ V17 巅峰内核：双区间速度渐变 + 软锁释放
  # ══════════════════════════════════════════════════════════════
  - id: send_volume_to_pga
    mode: restart
    then:
      - lambda: |-
          if (id(ota_active) || id(temp_protect)) {
            id(current_db) = -96.0f;
            id(target_db)  = -96.0f;
            pga2311::set_volume(0, 0);
            return;
          }

          if (!id(switching_input)) {
            float pct = 0.0f;
            if (!id(soft_mute)) {
              pct = (float)id(volume_val) / (float)id(max_volume);
              if (pct > 1.0f) pct = 1.0f;
            }
            float reg_f = pct * 255.0f;
            if (reg_f < 1.0f) {
              id(target_db) = -96.0f;
            } else {
              id(target_db) = (reg_f - 255.0f) * 0.5f;
            }
          }

      - while:
          condition:
            lambda: |-
              if (id(ota_active) || id(temp_protect)) return false;
              return fabs(id(target_db) - id(current_db)) > 0.09f;
          then:
            - lambda: |-
                float diff = id(target_db) - id(current_db);
                float diff_abs = fabs(diff);
                float speed;

                if (diff_abs > 10.0f) {
                  speed = 0.12f;
                } else if (diff_abs > 3.0f) {
                  speed = 0.08f;
                } else {
                  speed = 0.18f;
                }

                id(current_db) += diff * speed;

                float db = id(current_db);
                int base_reg;
                if (db <= -95.5f) {
                  base_reg = 0;
                } else {
                  base_reg = (int)roundf(255.0f + db * 2.0f);
                  if (base_reg < 0)   base_reg = 0;
                  if (base_reg > 255) base_reg = 255;
                }

                int bal   = id(balance);
                int l_reg = base_reg - (bal > 0 ? bal : 0);
                int r_reg = base_reg + (bal < 0 ? bal : 0);
                if (l_reg < 0) l_reg = 0;
                if (r_reg < 0) r_reg = 0;

                pga2311::set_volume(r_reg, l_reg);
            - delay: 15ms

      - lambda: |-
          if (id(ota_active) || id(temp_protect)) return;

          id(current_db) = id(target_db);

          float db = id(current_db);
          int base_reg;
          if (db <= -95.5f) {
            base_reg = 0;
          } else {
            base_reg = (int)roundf(255.0f + db * 2.0f);
            if (base_reg < 0)   base_reg = 0;
            if (base_reg > 255) base_reg = 255;
          }

          int bal   = id(balance);
          int l_reg = base_reg - (bal > 0 ? bal : 0);
          int r_reg = base_reg + (bal < 0 ? bal : 0);
          if (l_reg < 0) l_reg = 0;
          if (r_reg < 0) r_reg = 0;

          pga2311::set_volume(r_reg, l_reg);

          float vol_pct = roundf((float)id(volume_val) * 100.0f / (float)id(max_volume));
          if (vol_pct > 100.0f) vol_pct = 100.0f;
          id(volume_number)->publish_state(vol_pct);
          id(balance_number)->publish_state((float)id(balance));
          float media_pct = (float)id(volume_val) / (float)id(max_volume);
          if (media_pct > 1.0f) media_pct = 1.0f;
          id(media_volume)->publish_state(media_pct * 100.0f);

          int cur = id(current_input);
          int vol = id(volume_val);

          int last = 0;
          switch (cur) {
            case 0: last = id(last_saved_vol_0); break;
            case 1: last = id(last_saved_vol_1); break;
            case 2: last = id(last_saved_vol_2); break;
            case 3: last = id(last_saved_vol_3); break;
          }

          uint32_t now = millis();
          bool diff_large  = abs(vol - last) >= 2 && (now - id(last_save_ms) > 1500);
          bool stop_detect = abs(vol - last) > 0  && (now - id(last_v_change_ms) > 2000);

          if (!id(soft_mute) && (diff_large || stop_detect)) {
            id(last_save_ms) = now;
            switch (cur) {
              case 0: id(last_saved_vol_0) = vol; id(input_vol_0) = vol; break;
              case 1: id(last_saved_vol_1) = vol; id(input_vol_1) = vol; break;
              case 2: id(last_saved_vol_2) = vol; id(input_vol_2) = vol; break;
              case 3: id(last_saved_vol_3) = vol; id(input_vol_3) = vol; break;
            }
            ESP_LOGD("V17_SYNC", "Input %d volume %d saved safely.", cur, vol);
          }

  # ══════════════════════════════════════════════════════════════
  # 主题切换：更新所有界面控件颜色
  # ══════════════════════════════════════════════════════════════
  - id: apply_theme
    mode: single
    then:
      - lambda: |-
          lv_color_t accent;
          switch (id(theme)) {
            case 1: accent = lv_color_hex(0xEF4444); break;  // 红
            case 2: accent = lv_color_hex(0x3B82F6); break;  // 蓝
            case 3: accent = lv_color_hex(0x8B5CF6); break;  // 紫
            default: accent = lv_color_hex(0x10B981); break; // 绿
          }
          // LEDs
          lv_led_set_color(id(led_src_0), accent);
          lv_led_set_color(id(led_src_1), accent);
          lv_led_set_color(id(led_src_2), accent);
          lv_led_set_color(id(led_src_3), accent);
          // 分隔线
          lv_obj_set_style_bg_color(id(separator), accent, LV_PART_MAIN);
          // dB 标签
          lv_obj_set_style_text_color(id(lbl_vol_db), accent, LV_PART_MAIN);
          // 音量条指示器
          lv_obj_set_style_bg_color(id(bar_volume), accent, LV_PART_INDICATOR);
          // 音量浮层
          lv_obj_set_style_text_color(id(lbl_vol_big), accent, LV_PART_MAIN);
          // 温度计图标
          lv_obj_set_style_text_color(id(lbl_thermo_icon), accent, LV_PART_MAIN);
          // 设置页滑条指示器
          lv_obj_set_style_bg_color(id(slider_max_vol), accent, LV_PART_INDICATOR);
          lv_obj_set_style_bg_color(id(slider_power_on_limit), accent, LV_PART_INDICATOR);
          lv_obj_set_style_bg_color(id(slider_balance), accent, LV_PART_INDICATOR);
          lv_obj_set_style_bg_color(id(slider_brightness), accent, LV_PART_INDICATOR);
          lv_obj_set_style_bg_color(id(slider_display_timeout), accent, LV_PART_INDICATOR);
          // 平衡指示点
          lv_obj_set_style_bg_color(id(balance_dot), accent, LV_PART_MAIN);
          // 频谱页输入源图标
          lv_obj_set_style_text_color(id(lbl_spec_input_icon), accent, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(lbl_spec_input), accent, LV_PART_MAIN);

          // ═══ 频谱条颜色 — 7段渐变跟随主题 ═══
          {
            lv_color_t spec_colors[7];
            switch (id(theme)) {
              case 1: // 红
                spec_colors[0] = lv_color_hex(0x4E0606);
                spec_colors[1] = lv_color_hex(0x5F0E0E);
                spec_colors[2] = lv_color_hex(0x781A1A);
                spec_colors[3] = lv_color_hex(0x962828);
                spec_colors[4] = lv_color_hex(0xB93A3A);
                spec_colors[5] = lv_color_hex(0xD36060);
                spec_colors[6] = lv_color_hex(0xE79494);
                break;
              case 2: // 蓝
                spec_colors[0] = lv_color_hex(0x0E1E4E);
                spec_colors[1] = lv_color_hex(0x16285F);
                spec_colors[2] = lv_color_hex(0x1E3478);
                spec_colors[3] = lv_color_hex(0x284296);
                spec_colors[4] = lv_color_hex(0x3A5AB9);
                spec_colors[5] = lv_color_hex(0x607AD3);
                spec_colors[6] = lv_color_hex(0x94AEE7);
                break;
              case 3: // 紫
                spec_colors[0] = lv_color_hex(0x2E0E4E);
                spec_colors[1] = lv_color_hex(0x3E1A5F);
                spec_colors[2] = lv_color_hex(0x4E2878);
                spec_colors[3] = lv_color_hex(0x5E3A96);
                spec_colors[4] = lv_color_hex(0x7A52B9);
                spec_colors[5] = lv_color_hex(0x9A78D3);
                spec_colors[6] = lv_color_hex(0xC0A8E7);
                break;
              default: // 绿
                spec_colors[0] = lv_color_hex(0x064E3B);
                spec_colors[1] = lv_color_hex(0x065F46);
                spec_colors[2] = lv_color_hex(0x047857);
                spec_colors[3] = lv_color_hex(0x059669);
                spec_colors[4] = lv_color_hex(0x10B981);
                spec_colors[5] = lv_color_hex(0x34D399);
                spec_colors[6] = lv_color_hex(0x6EE7B7);
                break;
            }
            lv_obj_t* spec_bars[] = {
              id(spec_L_0), id(spec_L_1), id(spec_L_2), id(spec_L_3),
              id(spec_L_4), id(spec_L_5), id(spec_L_6),
              id(spec_R_0), id(spec_R_1), id(spec_R_2), id(spec_R_3),
              id(spec_R_4), id(spec_R_5), id(spec_R_6)
            };
            for (int i = 0; i < 14; i++) {
              lv_obj_set_style_bg_color(spec_bars[i], spec_colors[i % 7], LV_PART_INDICATOR);
            }
          }

  - id: switch_input
    mode: queued
    max_runs: 1
    then:
      - lambda: |-
          id(switching_input) = true;
          switch (id(current_input)) {
            case 0: id(input_vol_0) = id(volume_val); id(last_saved_vol_0) = id(volume_val); break;
            case 1: id(input_vol_1) = id(volume_val); id(last_saved_vol_1) = id(volume_val); break;
            case 2: id(input_vol_2) = id(volume_val); id(last_saved_vol_2) = id(volume_val); break;
            case 3: id(input_vol_3) = id(volume_val); id(last_saved_vol_3) = id(volume_val); break;
          }

      - if:
          condition:
            lambda: 'return !id(soft_mute);'
          then:
            - lambda: 'id(target_db) = -96.0f;'
            - script.execute: send_volume_to_pga
            - wait_until:
                condition:
                  lambda: 'return id(current_db) <= -95.5f;'
                timeout: 1200ms

      - lambda: 'pga2311::set_volume(0, 0);'
      - switch.turn_off: mute_switch
      - delay: 30ms

      - lambda: |-
          id(relay_in1)->turn_off();
          id(relay_in2)->turn_off();
          id(relay_in3)->turn_off();
          id(relay_in4)->turn_off();
      - delay: 50ms

      - lambda: |-
          switch (id(current_input)) {
            case 0: id(relay_in1)->turn_on(); break;
            case 1: id(relay_in2)->turn_on(); break;
            case 2: id(relay_in3)->turn_on(); break;
            case 3: id(relay_in4)->turn_on(); break;
          }
          const char* names[] = {"CD", "DAC", "PC", "AUX"};
          id(input_select)->publish_state(names[id(current_input)]);
      - delay: 100ms

      - if:
          condition:
            lambda: 'return !id(soft_mute) && !id(temp_protect);'
          then:
            - switch.turn_on: mute_switch
      - delay: 20ms

      - lambda: |-
          int new_vol = 160;
          switch (id(current_input)) {
            case 0: new_vol = id(input_vol_0); break;
            case 1: new_vol = id(input_vol_1); break;
            case 2: new_vol = id(input_vol_2); break;
            case 3: new_vol = id(input_vol_3); break;
          }
          if (new_vol > id(max_volume)) new_vol = id(max_volume);
          id(volume_val) = new_vol;
          id(last_v_change_ms) = millis();

          float vol_pct = roundf((float)id(volume_val) * 100.0f / (float)id(max_volume));
          if (vol_pct > 100.0f) vol_pct = 100.0f;
          id(volume_number)->publish_state(vol_pct);

          id(switching_input) = false;

      - if:
          condition:
            lambda: 'return !id(soft_mute) && !id(temp_protect);'
          then:
            - script.execute: send_volume_to_pga

  # ══════════════════════════════════════════════════════════════
  # ★ 自动输入切换：音频检测 → 优先级切换 (CD>DAC>PC>AUX)
  # ══════════════════════════════════════════════════════════════
  - id: auto_switch_input
    mode: restart
    then:
      - delay: 200ms   # 等待所有传感器稳定, 避免多个信号交叉触发
      - lambda: |-
          if (!id(auto_input) || !id(system_ready) || id(switching_input) || id(standby)) return;

          // ── 手动选择保护：用户手动选过某输入后，只在该输入失去信号时才自动切换 ──
          if (id(last_manual_input_ms) != 0) {
            bool cur_has_signal = false;
            switch (id(current_input)) {
              case 0: cur_has_signal = id(audio_cd)->state; break;
              case 1: cur_has_signal = id(audio_dac)->state; break;
              case 2: cur_has_signal = id(audio_pc)->state; break;
              case 3: cur_has_signal = id(audio_aux)->state; break;
            }
            if (cur_has_signal) return;            // 当前输入还有信号 → 尊重用户选择，不切走
            id(last_manual_input_ms) = 0;           // 当前输入已无信号 → 清除手动标记，允许自动切换
            ESP_LOGI("auto_input", "手动选择信号丢失，恢复自动切换");
          }

          // 优先级: CD(0) > DAC(1) > PC(2) > AUX(3)
          int target = -1;
          if (id(audio_cd)->state)  target = 0;
          else if (id(audio_dac)->state) target = 1;
          else if (id(audio_pc)->state)  target = 2;
          else if (id(audio_aux)->state) target = 3;

          // 所有通道无信号 -> 保持当前输入 (设计取舍: 宁留无声白噪声也不切断用户正在收听的微弱信号)
          if (target < 0) return;

          // 已经在目标通道 — 无需切换
          if (id(current_input) == target) return;

          ESP_LOGI("auto_input", "自动切换: %d -> %d", id(current_input), target);
          id(current_input) = target;
          const char* names[] = {"CD", "DAC", "PC", "AUX"};
          id(input_select)->publish_state(names[target]);
          id(switch_input)->execute();

# ═══════════════════════════════════════════════════════════════
# 传感器
# ═══════════════════════════════════════════════════════════════
sensor:
  - platform: rotary_encoder
    name: "音量编码器"
    id: volume_encoder
    pin_a:
      number: GPIO17
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO18
      mode:
        input: true
        pullup: true
    resolution: 1
    internal: true
    on_value:
      then:
        - lambda: |-
            static int last_enc = 0;
            int cur = (int)x;
            int diff = cur - last_enc;
            last_enc = cur;
            if (diff == 0) return;
            lv_obj_t* active = lv_scr_act();
            uint32_t now = millis();
            if (now - id(last_control_ms) < 30) return;
            id(last_control_ms) = now;

            // ═══════════════════════════════════════════════
            // 设置页导航（浏览 / 调节模式）
            // ═══════════════════════════════════════════════
            if (active == id(settings_page)->obj) {
              const int N = 7;
              lv_obj_t* items[N] = {
                id(slider_max_vol),          // 0 最大音量
                id(slider_power_on_limit),   // 1 开机音量
                (lv_obj_t*)id(dd_theme),                // 2 主题色彩
                id(slider_balance),          // 3 声道平衡
                (lv_obj_t*)id(dd_input),                // 4 输入选择
                id(slider_brightness),       // 5 屏幕亮度
                id(slider_display_timeout)   // 6 息屏超时
              };
              int idx = id(settings_focus_idx);
              int act = id(settings_active_idx);

              // ── 当前主题高亮色 ──
              lv_color_t hl_color;
              switch (id(theme)) {
                case 1: hl_color = lv_color_hex(0xEF4444); break;
                case 2: hl_color = lv_color_hex(0x3B82F6); break;
                case 3: hl_color = lv_color_hex(0x8B5CF6); break;
                default: hl_color = lv_color_hex(0x10B981); break;
              }

              // ── 清除全部高亮边框 ──
              auto clear_highlights = [&]() {
                for (int i = 0; i < N; i++)
                  lv_obj_set_style_border_width(items[i], 0, LV_PART_MAIN);
              };
              // ── 高亮指定项 ──
              auto set_highlight = [&](int i, int width) {
                if (i < 0 || i >= N) return;
                lv_obj_set_style_border_width(items[i], width, LV_PART_MAIN);
                lv_obj_set_style_border_color(items[i], hl_color, LV_PART_MAIN);
              };

              if (act < 0) {
                // ── 浏览模式：移动光标 ──
                clear_highlights();
                idx = (idx + diff + N) % N;
                id(settings_focus_idx) = idx;
                set_highlight(idx, 2);
              } else {
                // ── 调节模式：修改数值 ──
                int step = diff;
                switch (act) {
                  case 0: { // 最大音量
                    int v = id(max_volume) + step;
                    if (v < 10) v = 10; if (v > 255) v = 255;
                    id(max_volume) = v;
                    lv_bar_set_value(id(slider_max_vol), v, LV_ANIM_OFF);
                    id(max_volume_number)->publish_state((float)v);
                    if (id(volume_val) > v) id(volume_val) = v;
                    id(send_volume_to_pga)->execute();
                    break;
                  }
                  case 1: { // 开机音量
                    int v = id(power_on_limit) + step;
                    if (v < 10) v = 10; if (v > 255) v = 255;
                    id(power_on_limit) = v;
                    lv_bar_set_value(id(slider_power_on_limit), v, LV_ANIM_OFF);
                    id(power_on_limit_number)->publish_state((float)v);
                    if (id(volume_val) > v) id(volume_val) = v;
                    id(send_volume_to_pga)->execute();
                    break;
                  }
                  case 2: { // 主题色彩
                    int v = id(theme) + step;
                    if (v < 0) v = 3; if (v > 3) v = 0;
                    id(theme) = v;
                    lv_dropdown_set_selected((lv_obj_t*)id(dd_theme), v);
                    id(theme_number)->publish_state((float)v);
                    id(apply_theme)->execute();
                    break;
                  }
                  case 3: { // 声道平衡
                    int v = id(balance) + step;
                    if (v < -20) v = -20; if (v > 20) v = 20;
                    id(balance) = v;
                    lv_bar_set_value(id(slider_balance), v, LV_ANIM_OFF);
                    id(balance_number)->publish_state((float)v);
                    id(send_volume_to_pga)->execute();
                    break;
                  }
                  case 4: { // 输入选择（含1.5s防抖）
                    int v = id(current_input) + step;
                    if (v < 0) v = 3; if (v > 3) v = 0;
                    if (v != id(current_input)) {
                      id(current_input) = v;
                      id(last_manual_input_ms) = millis();   // 记录手动选择，阻止自动切换
                      lv_dropdown_set_selected((lv_obj_t*)id(dd_input), v);
                      uint32_t _n = millis();
                      if (_n - id(last_switch_ms) >= 1500) {
                        id(last_switch_ms) = _n;
                        const char* names[] = {"CD", "DAC", "PC", "AUX"};
                        id(input_select)->publish_state(names[v]);
                        id(switch_input)->execute();
                      }
                    }
                    break;
                  }
                  case 5: { // 屏幕亮度
                    int v = id(display_brightness) + step;
                    if (v < 0) v = 0; if (v > 100) v = 100;
                    id(display_brightness) = v;
                    lv_bar_set_value(id(slider_brightness), v, LV_ANIM_OFF);
                    {
                      auto call = id(display_backlight)->turn_on();
                      call.set_brightness(v / 100.0f);
                      call.perform();
                    }
                    id(display_brightness_number)->publish_state((float)v);
                    break;
                  }
                  case 6: { // 息屏超时
                    int v = id(display_timeout_min) + step;
                    if (v < 1) v = 1; if (v > 60) v = 60;
                    id(display_timeout_min) = v;
                    lv_bar_set_value(id(slider_display_timeout), v, LV_ANIM_OFF);
                    id(last_display_interaction) = now;
                    id(display_timeout_number)->publish_state((float)v);
                    break;
                  }
                }
              }
              id(last_v_change_ms) = now;
              return;
            }

            // ═══ 音量调节（仅主/浮层/频谱页）═══
            if (active != id(main_page)->obj && active != id(volume_big_page)->obj && active != id(spectrum_page)->obj) return;
            // 屏幕熄灭时只唤醒不调音量
            if (id(display_is_off)) return;
            int new_vol = id(volume_val) + diff;
            if (new_vol < 0) new_vol = 0;
            if (new_vol > id(max_volume)) new_vol = id(max_volume);
            id(volume_val) = new_vol;
            id(last_v_change_ms) = now;
            float pct = roundf((float)new_vol * 100.0f / (float)id(max_volume));
            if (pct > 100.0f) pct = 100.0f;
            id(volume_number)->publish_state(pct);
        - if:
            condition:
              lambda: 'return lv_scr_act() != id(settings_page)->obj;'
            then:
              - script.execute: send_volume_to_pga
              - script.execute: show_volume_big
        - script.execute: reset_idle_timer
  - platform: template
