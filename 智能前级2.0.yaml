# ═══════════════════════════════════════════════════════════════
# 颜色定义 — SquareLine 绿色主题
# ═══════════════════════════════════════════════════════════════
color:
  # ═══ SquareLine 绿色体系 ═══
  - id: color_black
    hex: "111827"          # 深灰蓝 — 主背景 (SquareLine bg)
  - id: color_white
    hex: "F1F5F9"          # 亮白 — 主文字
  - id: color_red
    hex: "FF0000"          # LED红
  - id: color_green
    hex: "10B981"          # 翠绿 — 主强调色 (SquareLine accent)
  - id: color_gray
    hex: "8E9FB8"          # 灰蓝 — 次要文字
  - id: color_dark
    hex: "1A1A2E"          # 深色面板背景
  - id: color_accent
    hex: "10B981"          # 翠绿 — 强调色 (与 color_green 一致)
  - id: color_muted
    hex: "FF3300"          # 静音指示红
  - id: color_bg_light
    hex: "E9E8E8"          # 浅灰 — 进度条背景
  # ── 频谱渐变色 (低音深绿 → 中音亮绿 → 高音黄/红) ──
  - id: color_spec_0
    hex: "064E3B"          # 63Hz   — 深翠绿
  - id: color_spec_1
    hex: "065F46"          # 160Hz  — 暗绿
  - id: color_spec_2
    hex: "047857"          # 400Hz  — 中绿
  - id: color_spec_3
    hex: "059669"          # 1kHz   — 翠绿
  - id: color_spec_4
    hex: "10B981"          # 2.5kHz — 亮绿 (主色)
  - id: color_spec_5
    hex: "34D399"          # 6.25kHz — 青绿
  - id: color_spec_6
    hex: "6EE7B7"          # 16kHz  — 浅绿
  - id: color_peak
    hex: "FFFFFF"          # 峰值保持线 — 白色
  - id: color_track
    hex: "1A1A2E"          # 频谱背景轨道色

# ═══════════════════════════════════════════════════════════════
# 输出
# ═══════════════════════════════════════════════════════════════
output:
  # LED 指示灯 (IO16)
  - platform: gpio
    id: led_indicator
    pin:
      number: GPIO16
      mode:
        output: true

  # TFT 背光 PWM (LEDC, IO7)
  - platform: ledc
    id: backlight_pwm
    pin: GPIO7
    frequency: 5000Hz

# ═══════════════════════════════════════════════════════════════
# 灯光 — TFT 背光
# ═══════════════════════════════════════════════════════════════
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "显示屏背光"
    id: display_backlight
    restore_mode: ALWAYS_ON

  # LED 指示灯 (IO16)
  - platform: binary
    output: led_indicator
    name: "LED指示灯"
    id: led_light
    restore_mode: ALWAYS_ON

# ═══════════════════════════════════════════════════════════════
# 开关
# ═══════════════════════════════════════════════════════════════
switch:
  # 硬件静音 — MCP23017 GPA6
  - platform: gpio
    id: mute_switch
    name: "静音-HW"
    icon: mdi:volume-mute
    pin:
      mcp23xxx: mcp23017_hub
      number: 6
      mode:
        output: true
    restore_mode: ALWAYS_OFF

  - platform: template
    name: "静音-SW"
    id: soft_mute_switch
    icon: mdi:volume-off
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_on_action:
      - globals.set: {id: soft_mute, value: 'true'}
      - script.execute: send_volume_to_pga
      - switch.turn_off: mute_switch
      - script.execute: reset_idle_timer
    turn_off_action:
      - globals.set: {id: soft_mute, value: 'false'}
      - switch.turn_on: mute_switch
      - script.execute: send_volume_to_pga
      - script.execute: reset_idle_timer

  - platform: template
    name: "待机模式"
    id: standby_switch
    icon: mdi:power
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_off_action:
      - script.execute: enter_standby
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(standby);'
          then:
            - script.execute: exit_standby

  # ── 输入继电器 (MCP23017 GPA3~GPA0, CD/DAC/PC/AUX) ──
  - platform: gpio
    id: relay_in1
    name: "继电器-输入1"
    pin:
      mcp23xxx: mcp23017_hub
      number: 3
      mode:
        output: true
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true

  - platform: gpio
    id: relay_in2
    name: "继电器-输入2"
    pin:
      mcp23xxx: mcp23017_hub
      number: 2
      mode:
        output: true
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true

  - platform: gpio
    id: relay_in3
    name: "继电器-输入3"
    pin:
      mcp23xxx: mcp23017_hub
      number: 1
      mode:
        output: true
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true

  - platform: gpio
    id: relay_in4
    name: "继电器-输入4"
    pin:
      mcp23xxx: mcp23017_hub
      number: 0
      mode:
        output: true
    restore_mode: RESTORE_DEFAULT_OFF
    internal: true

  # ── 自动输入切换开关 (HA 控制) ──
  - platform: template
    name: "自动输入切换"
    id: auto_input_switch
    icon: mdi:swap-horizontal
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - globals.set: {id: auto_input, value: 'true'}
    turn_off_action:
      - globals.set: {id: auto_input, value: 'false'}

# ═══════════════════════════════════════════════════════════════
# NV3007 2.79" TFT 显示 — ESPHome 官方 mipi_spi 驱动 (CUSTOM 模式)
# ═══════════════════════════════════════════════════════════════
display:
  - platform: mipi_spi
    model: CUSTOM
    spi_id: display_spi
    
    dc_pin: GPIO6
    reset_pin: GPIO15
    dimensions:
      width: 428
      height: 142
      offset_width: 0
      offset_height: 0
    color_depth: 16
    pixel_mode: 16bit
    invert_colors: false
    data_rate: 80MHz
    auto_clear_enabled: false
    update_interval: never
    id: tft_display
    init_sequence:
      # ── NV3007 解锁 ──
      - [0xFF, 0xA5]
      # ── 电源/时序配置 ──
      - [0x9A, 0x08]
      - [0x9B, 0x08]
      - [0x9C, 0xB0]
      - [0x9D, 0x16]
      - [0x9E, 0xC4]
      - [0x8F, 0x55, 0x04]
      - [0x84, 0x90]
      - [0x83, 0x7B]
      - [0x85, 0x33]
      # ── VBP/VFP ──
      - [0x60, 0x00]
      - [0x70, 0x00]
      - [0x61, 0x02]
      - [0x71, 0x02]
      - [0x62, 0x04]
      - [0x72, 0x04]
      # ── Gate EQ ──
      - [0x6C, 0x29]
      - [0x7C, 0x29]
      - [0x6D, 0x31]
      - [0x7D, 0x31]
      - [0x6E, 0x0F]
      - [0x7E, 0x0F]
      - [0x66, 0x21]
      - [0x76, 0x21]
      - [0x68, 0x3A]
      - [0x78, 0x3A]
      - [0x63, 0x07]
      - [0x73, 0x07]
      - [0x64, 0x05]
      - [0x74, 0x05]
      - [0x65, 0x02]
      - [0x75, 0x02]
      - [0x67, 0x23]
      - [0x77, 0x23]
      - [0x69, 0x08]
      - [0x79, 0x08]
      - [0x6A, 0x13]
      - [0x7A, 0x13]
      - [0x6B, 0x13]
      - [0x7B, 0x13]
      - [0x6F, 0x00]
      - [0x7F, 0x00]
      # ── Source OP ──
      - [0x50, 0x00]
      - [0x52, 0xD6]
      - [0x53, 0x08]
      - [0x54, 0x08]
      - [0x55, 0x1E]
      - [0x56, 0x1C]
      # ── GOA map ──
      - [0xA0, 0x2B, 0x24, 0x00]
      - [0xA1, 0x87]
      - [0xA2, 0x86]
      - [0xA5, 0x00]
      - [0xA6, 0x00]
      - [0xA7, 0x00]
      - [0xA8, 0x36]
      - [0xA9, 0x7E]
      - [0xAA, 0x7E]
      # ── GOA timing ──
      - [0xB9, 0x85]
      - [0xBA, 0x84]
      - [0xBB, 0x83]
      - [0xBC, 0x82]
      - [0xBD, 0x81]
      - [0xBE, 0x80]
      - [0xBF, 0x01]
      - [0xC0, 0x02]
      - [0xC1, 0x00]
      - [0xC2, 0x00]
      - [0xC3, 0x00]
      - [0xC4, 0x33]
      - [0xC5, 0x7E]
      - [0xC6, 0x7E]
      - [0xC8, 0x33, 0x33]
      - [0xC9, 0x68]
      - [0xCA, 0x69]
      - [0xCB, 0x6A]
      - [0xCC, 0x6B]
      - [0xCD, 0x33, 0x33]
      - [0xCE, 0x6C]
      - [0xCF, 0x6D]
      - [0xD0, 0x6E]
      - [0xD1, 0x6F]
      # ── Source Gamma ──
      - [0xAB, 0x03, 0x67]
      - [0xAC, 0x03, 0x6B]
      - [0xAD, 0x03, 0x68]
      - [0xAE, 0x03, 0x6C]
      - [0xB3, 0x00]
      - [0xB4, 0x00]
      - [0xB5, 0x00]
      - [0xB6, 0x32]
      - [0xB7, 0x7E]
      - [0xB8, 0x7E]
      # ── VCOM/Gamma ──
      - [0xE0, 0x00]
      - [0xE1, 0x03, 0x0F]
      - [0xE2, 0x04]
      - [0xE3, 0x01, 0x0E]
      - [0xE4, 0x01, 0x19]
      - [0xE5, 0x01]
      - [0xE6, 0x19]
      - [0xE7, 0x10]
      - [0xE8, 0x10]
      - [0xEA, 0x12]
      - [0xEB, 0xD0]
      - [0xEC, 0x04]
      - [0xED, 0x07, 0x07]
      - [0xEE, 0x07]
      - [0xEF, 0x09]
      - [0xF0, 0xD0]
      - [0xF1, 0x0E]
      - [0xF9, 0x17]
      - [0xF2, 0x2C, 0x1B, 0x0B, 0x20]
      # ── 1-dot inversion ──
      - [0xE9, 0x29]
      # ── TE ──
      - [0x35, 0x00]
      - [0x44, 0x00, 0x10]
      - [0x46, 0x10]
      # ── 退出解锁 ──
      - [0xFF, 0x00]
      # ── PIXFMT (0x3A) 由 ESPHome 2026.4+ 自动设置, 不再手动写 ──
      # ── MADCTL: 横屏旋转 (MV=1, 交换行列) ──
      - [0x36, 0x20]
      # ── Sleep Out ──
      - [0x11]
      - delay 220ms
      # ── Display On ──
      - [0x29]

# ═══════════════════════════════════════════════════════════════
# LVGL 图形框架 — 性能极限配置
#   buffer_size=100%: 全帧缓冲 (428×142×2=121KB), PSRAM 容纳, 零撕裂
#   partial_refresh: 仅传输脏区, 80MHz SPI 下脏区刷新 ~3-6ms (vs 25%缓冲多次分段刷新)
# ═══════════════════════════════════════════════════════════════
lvgl:
  displays:
    - tft_display
  encoders:
    - sensor: volume_encoder
      enter_button: encoder_button
      long_press_time: 800ms
  buffer_size: 100%
  color_depth: 16
  theme:
    dark_mode: true
  default_font: font_cn_small

  on_idle:
    - timeout: 2s
      then:
        - if:
            condition:
              lvgl.page.is_showing: volume_big_page
            then:
              - lvgl.page.show:
                  id: main_page
                  animation: LV_SCREEN_LOAD_ANIM_FADE_IN
                  time: 200ms
    - timeout: 30s
      then:
        - if:
            condition:
              and:
                - lambda: 'return !id(standby) && id(system_ready);'
                - lvgl.page.is_showing: main_page
                - lambda: |-
                    switch (id(current_input)) {
                      case 0: return id(audio_cd)->state;
                      case 1: return id(audio_dac)->state;
                      case 2: return id(audio_pc)->state;
                      case 3: return id(audio_aux)->state;
                      default: return false;
                    }
            then:
              - lvgl.page.show:
                  id: spectrum_page
                  animation: LV_SCREEN_LOAD_ANIM_FADE_IN
                  time: 200ms
    - timeout: 30s
      then:
        - if:
            condition:
              lvgl.page.is_showing: settings_page
            then:
              - lvgl.page.show:
                  id: main_page
                  animation: LV_SCREEN_LOAD_ANIM_FADE_IN
                  time: 200ms
    - timeout: 35s
      then:
        - if:
            condition:
              and:
                - lvgl.page.is_showing: spectrum_page
                - lambda: |-
                    switch (id(current_input)) {
                      case 0: return !id(audio_cd)->state;
                      case 1: return !id(audio_dac)->state;
                      case 2: return !id(audio_pc)->state;
                      case 3: return !id(audio_aux)->state;
                      default: return true;
                    }
            then:
              - lvgl.page.show:
                  id: main_page
                  animation: LV_SCREEN_LOAD_ANIM_FADE_IN
                  time: 200ms

  on_resume:
    then:
      # 先刷新数据, 再亮屏 — 避免唤醒瞬间显示旧数据 (频谱冻结/温度过时)
      - lambda: |-
          if (!id(standby)) {
            msgeq7::read();
            msgeq7::read_ntc();
            float _ntc = msgeq7::get_temperature();
            if (msgeq7::is_temperature_valid(_ntc)) {
              id(ntc_temp)->publish_state(_ntc);
            }
          }
      - light.turn_on:
          id: display_backlight
          transition_length: 500ms
      - globals.set: {id: display_is_off, value: 'false'}

  pages:
    # ── 主页面：SquareLine 绿色风格 428×142 ──
    - id: main_page
      bg_color: 0x111827
      widgets:
        # ════════════════════════════════════════════
        # 顶栏 — MDI 输入源图标 + LED + 温度 + WiFi/BLE
        # ════════════════════════════════════════════

        # ── MDI 输入源图标 (4个) ──
        - label:
            id: lbl_src_radio
            x: 5
            y: 0
            width: 22
            height: 29
            text: "\U000F0960"
            text_font: mdi_icons_22
            text_align: CENTER
            text_color: !lambda |-
              return id(current_input) == 0 ? lv_color_hex(0x10B981) : lv_color_hex(0x444444);
        - label:
            id: lbl_src_gamepad
            x: 28
            y: 0
            width: 22
            height: 29
            text: "\U000F061A"
            text_font: mdi_icons_22
            text_align: CENTER
            text_color: !lambda |-
              return id(current_input) == 1 ? lv_color_hex(0x10B981) : lv_color_hex(0x444444);
        - label:
            id: lbl_src_laptop
            x: 51
            y: 0
            width: 22
            height: 29
            text: "\U000F0322"
            text_font: mdi_icons_22
            text_align: CENTER
            text_color: !lambda |-
              return id(current_input) == 2 ? lv_color_hex(0x10B981) : lv_color_hex(0x444444);
        - label:
            id: lbl_src_music
            x: 74
            y: 0
            width: 22
            height: 29
            text: "\U000F186C"
            text_font: mdi_icons_22
            text_align: CENTER
            text_color: !lambda |-
              return id(current_input) == 3 ? lv_color_hex(0x10B981) : lv_color_hex(0x444444);

        # ── 4颗 LED 指示灯 (输入源) ──
        - led:
            id: led_src_0
            x: 12
            y: 18
            width: 8
            height: 8
            color: 0x10B981
            bg_color: 0x444444
            radius: 9999
        - led:
            id: led_src_1
            x: 35
            y: 18
            width: 8
            height: 8
            color: 0x10B981
            bg_color: 0x444444
            radius: 9999
        - led:
            id: led_src_2
            x: 58
            y: 18
            width: 8
            height: 8
            color: 0x10B981
            bg_color: 0x444444
            radius: 9999
        - led:
            id: led_src_3
            x: 81
            y: 18
            width: 8
            height: 8
            color: 0x10B981
            bg_color: 0x444444
            radius: 9999

        # ── 温度计图标 + 温度值 ──
        - label:
            id: lbl_thermo_icon
            x: 270
            y: 2
            width: 20
            height: 16
            text: "\U000F050F"
            text_font: mdi_icons_16
            text_align: CENTER
            text_color: 0x10B981
        - label:
            id: lbl_temp_value
            x: 288
            y: 2
            width: 36
            height: 14
            text: !lambda |-
              static char buf[8];
              if (id(ntc_temp)->has_state())
                snprintf(buf, sizeof(buf), "%.1f", id(ntc_temp)->state);
              else
                snprintf(buf, sizeof(buf), "--.-");
              return buf;
            text_color: 0xF1F5F9
            text_align: LEFT
            text_font: montserrat_12
        - label:
            id: lbl_temp_unit
            x: 322
            y: 4
            width: 18
            height: 10
            text: "°C"
            text_color: 0x8E9FB8
            text_align: LEFT
            text_font: montserrat_8

        # ── 静音指示 ──
        - label:
            id: lbl_mute
            x: 340
            y: 2
            width: 28
            height: 14
            text: !lambda |-
              return std::string(id(soft_mute) ? "静音" : "");
            text_font: font_cn_small
            text_align: CENTER
            text_color: 0xEF4444

        # ── 电源状态图标 ──
        - label:
            id: lbl_power
            x: 368
            y: 2
            width: 16
            height: 14
            text: "\U000F0425"
            text_font: mdi_icons_12
            text_align: CENTER
            text_color: !lambda |-
              return id(standby) ? lv_color_hex(0x666666) : lv_color_hex(0x10B981);

        # ── BLE 图标 ──
        - label:
            id: lbl_ble
            x: 376
            y: 0
            width: 28
            height: 27
            text: "\U000F00AF"
            text_font: mdi_icons_27
            text_align: CENTER
            text_color: !lambda |-
              return id(ble_connected) ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x333333);
        # ── WiFi 图标 ──
        - label:
            id: lbl_wifi
            x: 404
            y: 0
            width: 24
            height: 27
            text: "\U000F05A9"
            text_font: mdi_icons_24
            text_align: CENTER
            text_color: !lambda |-
              if (wifi::global_wifi_component->is_connected()) return lv_color_hex(0xFFFFFF);
              return lv_color_hex(0x333333);

        # ════════════════════════════════════════════
        # 分隔线
        # ════════════════════════════════════════════
        - obj:
            id: separator
            x: 0
            y: 31
            width: 428
            height: 1
            bg_color: 0x10B981
            bg_opa: 50%

        # ════════════════════════════════════════════
        # 音量大数字 dB 值 (Montserrat 30 绿色)
        # ════════════════════════════════════════════
        - label:
            id: lbl_vol_db
            x: 80
            y: 20
            width: 268
            height: 28
            text: !lambda |-
              float vol_pct = (float)id(volume_val) / (float)id(max_volume);
              if (vol_pct > 1.0f) vol_pct = 1.0f;
              float reg_f = vol_pct * 255.0f;
              float db = (reg_f < 1.0f) ? -96.0f : (reg_f - 255.0f) * 0.5f;
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1fdB", db);
              return std::string(buf);
            text_color: 0x10B981
            bg_opa: 0%
            text_align: CENTER
            text_font: montserrat_27

        # ════════════════════════════════════════════
        # 水平音量条 (绿色, 满宽)
        # ════════════════════════════════════════════
        - bar:
            id: bar_volume
            x: 5
            y: 50
            width: 418
            height: 14
            value: !lambda return (float)id(volume_val) * 100.0f / (float)id(max_volume);
            min_value: 0
            max_value: 100
            indicator:
              bg_color: 0x10B981
              radius: 7
            bg_color: 0xE9E8E8
            bg_opa: 42%
            radius: 7

        # ═══ 左右声道平衡指示 ═══
        # 平衡条: L ─────●────── R
        - label:
            id: lbl_bal_L
            x: 56
            y: 112
            width: 12
            height: 14
            text: "L"
            text_font: montserrat_12
            text_align: CENTER
            text_color: 0x8E9FB8
        - label:
            id: lbl_bal_R
            x: 360
            y: 112
            width: 12
            height: 14
            text: "R"
            text_font: montserrat_12
            text_align: CENTER
            text_color: 0x8E9FB8
        - obj:
            id: balance_track
            x: 70
            y: 116
            width: 288
            height: 4
            bg_color: 0x444444
            bg_opa: 100%
        - obj:
            id: balance_dot
            x: 210
            y: 111
            width: 8
            height: 14
            bg_color: 0x10B981
            bg_opa: cover
            radius: 3
        - label:
            id: lbl_balance_val
            x: 70
            y: 124
            width: 288
            height: 12
            text: !lambda |-
              int b = id(balance);
              if (b == 0) return std::string("平衡");
              char buf[8];
              snprintf(buf, sizeof(buf), "%s%d", b < 0 ? "L" : "R", abs(b));
              return std::string(buf);
            text_font: montserrat_8
            text_align: CENTER
            text_color: 0x4A6890
