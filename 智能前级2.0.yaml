substitutions:
  device_name: zhitong-preamp-2
  friendly_name: "智能前级2.0"
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ap_ssid: !secret ap_ssid
  ap_password: !secret ap_password
  ota_password: !secret ota_password
  api_key: !secret api_key
  firmware_version: "v2.0.0"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - pga2311.h
    - msgeq7.h
    - lvgl_compat.h

  on_boot:
    # priority 200 -> -100 严格串行: 硬件初始化先于软件恢复
    # 若顺序颠倒会导致 SPI/ADC 未就绪时写入数据
    - priority: 200
      then:
        - lambda: |-
            ESP_LOGD("PGA2311", "Initializing SPI3 and PGA2311 at priority 200");
            pga2311::setup();
            pga2311::set_volume(0, 0);
            delay(5);
            pga2311::set_volume(0, 0);
            msgeq7::setup();

    - priority: -100
      then:
        - lambda: |-
            if (id(current_input) < 0 || id(current_input) > 3) id(current_input) = 0;
            if (id(max_volume) < 10 || id(max_volume) > 255) id(max_volume) = 160;
            if (id(power_on_limit) < 10 || id(power_on_limit) > 255) id(power_on_limit) = 110;
            if (id(balance) < -20 || id(balance) > 20) id(balance) = 0;
            if (id(display_timeout_min) < 1 || id(display_timeout_min) > 60) id(display_timeout_min) = 5;
            if (id(display_brightness) < 0 || id(display_brightness) > 100) id(display_brightness) = 80;
            if (id(volume_val) < 0) id(volume_val) = 0;

            id(current_db) = -96.0f;
            id(target_db)  = -96.0f;

            switch (id(current_input)) {
              case 0: id(volume_val) = id(input_vol_0); break;
              case 1: id(volume_val) = id(input_vol_1); break;
              case 2: id(volume_val) = id(input_vol_2); break;
              case 3: id(volume_val) = id(input_vol_3); break;
            }
            if (id(volume_val) > id(max_volume)) id(volume_val) = id(max_volume);
            if (id(volume_val) > id(power_on_limit)) id(volume_val) = id(power_on_limit);

            id(last_saved_vol_0) = id(input_vol_0);
            id(last_saved_vol_1) = id(input_vol_1);
            id(last_saved_vol_2) = id(input_vol_2);
            id(last_saved_vol_3) = id(input_vol_3);

            id(max_volume_number)->publish_state((float)id(max_volume));
            id(power_on_limit_number)->publish_state((float)id(power_on_limit));
            id(balance_number)->publish_state((float)id(balance));
            id(display_timeout_number)->publish_state((float)id(display_timeout_min));
            id(display_brightness_number)->publish_state((float)id(display_brightness));
            id(theme_number)->publish_state((float)id(theme));

            const char* names[] = {"CD", "DAC", "PC", "AUX"};
            id(input_select)->publish_state(names[id(current_input)]);
            id(standby_switch)->publish_state(!id(standby));

        - if:
            condition:
              lambda: 'return !id(standby);'
            then:
              - lambda: |-
                  float boot_pct = (float)id(volume_val) * 100.0f / (float)id(max_volume);
                  if (boot_pct > 100.0f) boot_pct = 100.0f;
                  id(volume_number)->publish_state(boot_pct);
              - script.execute: switch_input
              - wait_until:
                  condition:
                    lambda: 'return !id(switch_input)->is_running();'
                  timeout: 5000ms
              - script.execute: display_idle_timer
              - script.execute: apply_theme    # ★ 上电后应用保存的主题色
              - lambda: 'id(system_ready) = true;'

        - if:
            condition:
              lambda: 'return id(standby);'
            then:
              - lambda: |-
                  id(soft_mute) = true;
                  pga2311::set_volume(0, 0);
                  id(current_db) = -96.0f;
                  id(target_db)  = -96.0f;
              - switch.turn_off: mute_switch

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    advanced:
      include_builtin_idf_components:
        - esp_adc
    sdkconfig_options:
      # ═══ ESP32-S3 性能极限配置 ═══
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"       # CPU 锁定 240MHz (默认可能降频 160MHz)
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "y"               # PSRAM 支持
      CONFIG_SPIRAM_MODE_OCT: "y"                       # 八线 PSRAM
      CONFIG_SPIRAM_SPEED_80M: "y"                      # PSRAM 80MHz
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"             # ★ 从 PSRAM 取指令 (释放 Flash 带宽给 LVGL 字体渲染)
      CONFIG_SPIRAM_RODATA: "y"                         # ★ 从 PSRAM 读取只读数据 (字体 glyph 不再抢 Flash)
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"           # ★ 数据缓存行 64B (默认 32B, 翻倍提升 DMA/PSRAM 命中率)
      CONFIG_ESP32S3_INSTRUCTION_CACHE_LINE_64B: "y"    # ★ 指令缓存行 64B (提升高频调用函数缓存命中)
      CONFIG_LV_USE_DRAW_SW_ASM: "y"                    # LVGL 使用 ESP32-S3 SIMD 指令加速渲染
      CONFIG_LV_DRAW_SW_ASM_ASSUME_VFP: "y"            # 使用硬件 FPU 加速浮点渲染
      CONFIG_SPIRAM_USE_MALLOC: "y"                     # 允许 malloc 使用 PSRAM (大缓冲区自动进 PSRAM)
      CONFIG_ESP32S3_DATA_CACHE_SIZE_64KB: "y"          # ★ 数据缓存 64KB (默认 32KB, 大幅减少 PSRAM 未命中)
      CONFIG_ESP32S3_INSTRUCTION_CACHE_SIZE_32KB: "y"   # 指令缓存 32KB (默认 16KB)
psram:
  mode: octal
  speed: 80MHz

esp32_ble_server:
  manufacturer: "Zhitong Audio"
  model: "PreAmp 2.0"
  on_connect:
    - lambda: 'id(ble_connected) = true;'
  on_disconnect:
    - lambda: 'id(ble_connected) = false;'
  services:
    - uuid: "0000FFE0-0000-1000-8000-00805F9B34FB"
      advertise: true
      characteristics:
        - id: ble_notify_char
          uuid: "0000FFE2-0000-1000-8000-00805F9B34FB"
          notify: true
          read: true
        - id: ble_write_char
          uuid: "0000FFE1-0000-1000-8000-00805F9B34FB"
          write: true
          write_no_response: true
          on_write:
            then:
              - lambda: |-
                  if (x.size() < 4 || x[0] != 0xAA) {
                    return;
                  }
                  uint8_t cmd = x[1];
                  uint8_t len = x[2];
                  if (x.size() < 4 + len) {
                    return;
                  }
                  uint8_t crc = cmd ^ len;
                  for(int i=0; i<len; i++) crc ^= x[3+i];
                  if (crc != x[3+len]) {  // x[3+len] 是紧接 payload 后的 CRC 字节
                    return;
                  }

                  auto make_status = [&]() -> std::vector<uint8_t> {
                    uint8_t temp_int = 0;
                    if (id(ntc_temp)->has_state()) temp_int = (uint8_t)std::min(std::max((int)round(id(ntc_temp)->state), 0), 127);
                    std::vector<uint8_t> payload = {
                      (uint8_t)id(volume_val),
                      (uint8_t)(id(soft_mute) ? 0x01 : 0x00),
                      (uint8_t)id(current_input),
                      (uint8_t)(id(balance) + 20),
                      temp_int,
                      (uint8_t)id(max_volume),
                      (uint8_t)(id(standby) ? 0x01 : 0x00),
                      (uint8_t)id(power_on_limit),
                      (uint8_t)id(display_timeout_min)
                    };
                    uint8_t p_len = payload.size();
                    uint8_t p_cmd = 0x80;
                    uint8_t p_crc = p_cmd ^ p_len;
                    for (uint8_t b : payload) p_crc ^= b;

                    std::vector<uint8_t> frame = {0xBB, p_cmd, p_len};
                    frame.insert(frame.end(), payload.begin(), payload.end());
                    frame.push_back(p_crc);
                    return frame;
                  };

                  if (!id(system_ready) && cmd != 0x06 && cmd != 0x10) return;

                  uint32_t now = millis();
                  if (cmd == 0x01 || cmd == 0x04) {
                    if (now - id(last_control_ms) < 30) return;
                    id(last_control_ms) = now;
                  }

                  switch (cmd) {
                    case 0x01: {
                      if (len < 1 || id(switching_input)) break;
                      uint8_t vol = x[3];
                      if (vol > id(max_volume)) vol = id(max_volume);
                      id(volume_val) = vol;
                      id(last_v_change_ms) = now;

                      float pct = (float)vol * 100.0f / (float)id(max_volume);
                      if (pct > 100.0f) pct = 100.0f;
                      id(volume_number)->publish_state(pct);
                      id(send_volume_to_pga)->execute();
                      id(reset_idle_timer)->execute();
                      break;
                    }
                    case 0x02: {
                      if (len < 1) break;
                      bool mute = x[3] == 0x01;
                      if (mute != id(soft_mute)) {
                        if (mute) id(soft_mute_switch)->turn_on();
                        else      id(soft_mute_switch)->turn_off();
                      }
                      break;
                    }
                    case 0x03: {
                      if (len < 1) break;
                      uint8_t input = x[3];
                      if (input > 3) break;
                      if (now - id(last_switch_ms) < 1500) break;
                      if (id(current_input) != input) {
                        id(last_switch_ms) = now;
                        id(current_input) = input;
                        const char* names[] = {"CD", "DAC", "PC", "AUX"};
                        id(input_select)->publish_state(names[input]);
                        id(switch_input)->execute();
                      }
                      id(reset_idle_timer)->execute();
                      break;
                    }
                    case 0x04: {
                      if (len < 1) break;
                      int8_t bal = (int8_t)x[3] - 20;
                      if (bal < -20) bal = -20;
                      if (bal > 20)  bal = 20;
                      id(balance) = bal;
                      id(balance_number)->publish_state((float)bal);
                      id(send_volume_to_pga)->execute();
                      id(reset_idle_timer)->execute();
                      break;
                    }
                    case 0x05: {
                      if (len < 1) break;
                      uint8_t max_vol = x[3];
                      if (max_vol < 10)  max_vol = 10;
                      if (max_vol > 255) max_vol = 255;
                      id(max_volume) = max_vol;
                      if (id(volume_val) > max_vol) {
                         id(volume_val) = max_vol;
                         id(last_v_change_ms) = now;
                      }
                      id(max_volume_number)->publish_state((float)max_vol);
                      float pct = (float)id(volume_val) * 100.0f / (float)id(max_volume);
                      if (pct > 100.0f) pct = 100.0f;
                      id(volume_number)->publish_state(pct);
                      id(send_volume_to_pga)->execute();
                      break;
                    }
                    case 0x06: {
                      if (len < 1) break;
                      bool want_standby = x[3] == 0x01;
                      if (want_standby && !id(standby))  id(standby_switch)->turn_off();
                      else if (!want_standby && id(standby)) id(standby_switch)->turn_on();
                      break;
                    }
                    case 0x07: {
                      id(media_select)->publish_state("播放");
                      id(media_reset)->execute();
                      break;
                    }
                    case 0x0A: {
                      id(media_select)->publish_state("暂停");
                      id(media_reset)->execute();
                      break;
                    }
                    case 0x08: {
                      id(media_select)->publish_state("下一首");
                      id(media_reset)->execute();
                      break;
                    }
                    case 0x09: {
                      id(media_select)->publish_state("上一首");
                      id(media_reset)->execute();
                      break;
                    }
                    case 0x0B: {
                      if (!id(standby)) break;
                      id(standby_switch)->turn_on();
                      break;
                    }
                    case 0x0C: {
                      if (id(standby)) break;
                      id(standby_switch)->turn_off();
                      break;
                    }
                    case 0x0D: {
                      if (len < 1) break;
                      uint8_t pol = x[3];
                      if (pol < 10)  pol = 10;
                      if (pol > 255) pol = 255;
                      id(power_on_limit) = pol;
                      id(power_on_limit_number)->publish_state((float)pol);
                      break;
                    }
                    case 0x0E: {
                      if (len < 1) break;
                      uint8_t tm = x[3];
                      if (tm < 1)  tm = 1;
                      if (tm > 60) tm = 60;
                      id(display_timeout_min) = tm;
                      id(display_timeout_number)->publish_state((float)tm);
                      break;
                    }
                    case 0x10: {
                      id(ble_notify_char)->set_value(make_status());
                      id(ble_notify_char)->notify();
                      return;
                    }
                    default: {
                      uint8_t n_crc = 0x81 ^ 0x02 ^ cmd ^ 0x00;
                      id(ble_notify_char)->set_value({0xBB, 0x81, 0x02, cmd, 0x00, n_crc});
                      id(ble_notify_char)->notify();
                      return;
                    }
                  }

                  uint8_t a_cmd = 0x81;
                  uint8_t a_len = 0x02;
                  uint8_t a_crc = a_cmd ^ a_len ^ cmd ^ 0x01;
                  id(ble_notify_char)->set_value({0xBB, a_cmd, a_len, cmd, 0x01, a_crc});
                  id(ble_notify_char)->notify();

logger:

api:
  encryption:
    key: ${api_key}
  services:
    - service: set_volume
      variables:
        vol: float
      then:
        - lambda: |-
            if (!id(system_ready) || id(switching_input)) return;
            uint32_t now = millis();
            if (now - id(last_control_ms) < 30) return;
            id(last_control_ms) = now;

            int v = (int)(vol * id(max_volume));
            if (v < 0) v = 0;
            if (v > id(max_volume)) v = id(max_volume);
            id(volume_val) = v;
            id(last_v_change_ms) = now;

        - script.execute: send_volume_to_pga
        - script.execute: reset_idle_timer

    - service: set_mute
      variables:
        muted: bool
      then:
        - lambda: |-
            if (!id(system_ready)) return;
            id(soft_mute) = muted;
            if (muted) id(mute_switch)->turn_off();
            else       id(mute_switch)->turn_on();
        - script.execute: send_volume_to_pga
        - script.execute: reset_idle_timer

    - service: set_input
      variables:
        input_name: string
      then:
        - lambda: |-
            if (!id(system_ready)) return;
            uint32_t now = millis();
            if (now - id(last_switch_ms) < 1500) return;
            id(last_switch_ms) = now;

            if      (input_name == "CD")  id(current_input) = 0;
            else if (input_name == "DAC") id(current_input) = 1;
            else if (input_name == "PC")  id(current_input) = 2;
            else if (input_name == "AUX") id(current_input) = 3;
        - script.execute: switch_input
        - script.execute: reset_idle_timer

ota:
  - platform: esphome
    password: ${ota_password}
    on_begin:
      - lambda: |-
          id(ota_active) = true;
          id(current_db) = -96.0f;
          id(target_db)  = -96.0f;
          pga2311::set_volume(0, 0);
    on_end:
      - lambda: 'id(ota_active) = false;'
    on_error:
      - lambda: 'id(ota_active) = false;'

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: ${ap_ssid}
    password: ${ap_password}

captive_portal:
web_server:
  port: 80

# ═══════════════════════════════════════════════════════════════
# SPI 总线 — NV3007 TFT 显示 (ESPHome SPI2_HOST, 与 PGA2311 SPI3_HOST 无冲突)
# ═══════════════════════════════════════════════════════════════
# ESP32-S3 SPI2_HOST 支持 DMA, 80MHz 时自动启用 (传输期间 CPU 空闲)
# TFT: SDA=IO4, SCLK=IO5 (CS=GND 常选)
# ═══════════════════════════════════════════════════════════════
spi:
  - id: display_spi
    clk_pin: GPIO5
    mosi_pin: GPIO4
    

# ═══════════════════════════════════════════════════════════════
# I2C 总线 — MCP23017 (SDA=IO38, SCL=IO40)
# ═══════════════════════════════════════════════════════════════
i2c:
  sda: GPIO38
  scl: GPIO40
  scan: true
  id: bus_a
  frequency: 400kHz

# MCP23017 I/O 扩展芯片 (地址 0x27)
#   继电器 1~4 : GPA3/GPA2/GPA1/GPA0 (CD/DAC/PC/AUX)
#   硬件静音    : GPA6
#   音频检测     : GPB3/GPB2/GPB1/GPB0 (CD/DAC/PC/AUX)
mcp23017:
  - id: mcp23017_hub
    address: 0x27

